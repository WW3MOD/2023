name: Feature request / Balance feedback
description: Suggest a new feature, gameplay change, or balance tweak
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: What kind of change?
      options:
        - New feature
        - Balance tweak
        - Quality of life
        - UI / UX
        - Other
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why? What problem does this solve?
      placeholder: When I do X, I expected Y, but Z happens instead. This would help by...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds? Are there other ways to address this?
