Container@INGAME_MENU:
	Width: WINDOW_WIDTH
	Height: WINDOW_HEIGHT
	Logic: IngameMenuLogic
		Buttons: RESUME, LOAD_GAME, SAVE_GAME, SETTINGS, MUSIC, SURRENDER, RESTART, BACK_TO_EDITOR, ABORT_MISSION, SAVE_MAP, PLAY_MAP, EXIT_EDITOR
		ButtonStride: 0, 40
	Children:
		Background@BORDER:
			X: 0 - 15
			Y: 0 - 15
			Width: WINDOW_WIDTH + 30
			Height: WINDOW_HEIGHT + 30
			Background: mainmenu-border
		Background@COMBINED_PANEL:
			X: (WINDOW_WIDTH - WIDTH) / 2
			Y: (WINDOW_HEIGHT - HEIGHT) / 2
			Width: 760
			Height: 500
			Children:
				Container@MENU_BUTTONS:
					X: 5
					Y: (PARENT_HEIGHT - HEIGHT) / 2
					Width: 170
					Height: 120
					Children:
						Label@LABEL_TITLE:
							X: (PARENT_WIDTH - WIDTH) / 2
							Y: 20
							Width: 170
							Height: 30
							Text: label-menu-buttons-title
							Align: Center
							Font: Bold
						Button@BUTTON_TEMPLATE:
							X: (PARENT_WIDTH - WIDTH) / 2
							Y: 60
							Width: 140
							Height: 30
							Font: Bold
				Container@PANEL_ROOT:
					X: 175
					Y: 0
					Width: 580
					Height: PARENT_HEIGHT
