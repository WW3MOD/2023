		# Vertical rhythm — 16px gap between sections, 30px button heights for proper
		# internal padding (text gets ~7px above/below the baseline). The Y values
		# below are the canonical "no extra slots" layout; LobbyLogic captures them
		# at load and shifts them by delta as the roster auto-expands.
		Container@LOBBY_SETUP_ROW:
			Logic: LobbySetupRowLogic
			Y: 216
			Width: PARENT_WIDTH
			Height: 30
			Children:
				Button@ADD_BOTS_BUTTON:
					X: 5
					Y: 0
					Width: 110
					Height: 30
					Font: Bold
					Text: + Add Bots
				Button@REMOVE_BOTS_BUTTON:
					X: 125
					Y: 0
					Width: 130
					Height: 30
					Font: Bold
					Text: - Remove Bots
				DropDownButton@AUTO_TEAM_BUTTON:
					X: 265
					Y: 0
					Width: 130
					Height: 30
					Font: Bold
					Text: Auto-Team
				Button@REPLAY_LAST_BUTTON:
					X: 405
					Y: 0
					Width: 140
					Height: 30
					Font: Bold
					Text: Replay last
		Container@LOBBY_ACTIVE_CHANGES:
			Logic: LobbyActiveChangesLogic
			Y: 262
			Width: PARENT_WIDTH
			Height: 56
