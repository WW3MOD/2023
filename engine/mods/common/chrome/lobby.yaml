Background@SERVER_LOBBY:
	Logic: LobbyLogic
		ChatTemplates:
			Chat: CHAT_LINE_TEMPLATE
			Join: SYSTEM_LINE_TEMPLATE
			Leave: SYSTEM_LINE_TEMPLATE
			System: SYSTEM_LINE_TEMPLATE
			Mission: CHAT_LINE_TEMPLATE
			Feedback: TRANSIENT_LINE_TEMPLATE
	X: (WINDOW_WIDTH - WIDTH) / 2
	Y: (WINDOW_HEIGHT - HEIGHT) / 2
	Width: 900
	Height: WINDOW_HEIGHT - 200
	Children:
		Background@SOLID_FILL:
			X: 4
			Y: 4
			Width: PARENT_WIDTH - 8
			Height: PARENT_HEIGHT - 8
			Background: dialog-lobby-fill
		Label@SERVER_NAME:
			Y: 16
			Align: Center
			Width: PARENT_WIDTH
			Height: 25
			Font: Bold
		Container@MAP_PREVIEW_ROOT:
			X: PARENT_WIDTH - 20 - WIDTH
			Y: 67
			Width: 200
			Height: 270
		# Right-rail order (top → bottom): preview, title, type, author (all in
		# the preview widget's MAP_LARGE/MAP_AVAILABLE overlays), then scenario
		# picker (the variation knob for the current map), then Change Map (the
		# heavy action that resets the whole rail).
		Button@CHANGEMAP_BUTTON:
			X: PARENT_WIDTH - WIDTH - 20
			Y: 387
			Width: 200
			Height: 30
			Text: button-server-lobby-changemap
			Font: Bold
		DropDownButton@SLOTS_DROPDOWNBUTTON:
			X: 20
			Y: PARENT_HEIGHT - 304
			Width: 185
			Height: 25
			Font: Bold
			Text: dropdownbutton-server-lobby-slots
		Button@RESET_OPTIONS_BUTTON:
			X: 20
			Y: PARENT_HEIGHT - 304
			Width: 185
			Height: 25
			Font: Bold
			Text: button-server-lobby-reset-options
		Container@TOP_PANELS_ROOT:
			X: 20
			Y: 132
			Width: 675
			Height: PARENT_HEIGHT - 411
		Container@SKIRMISH_TABS:
			X: 20
			Width: 360
			Height: PARENT_HEIGHT
			Visible: False
			Children:
				Button@PLAYERS_TAB:
					Y: 67
					Width: 110
					Height: 31
					Font: Bold
					Text: button-skirmish-tabs-players-tab
				Button@OPTIONS_TAB:
					X: 110
					Y: 67
					Width: 110
					Height: 31
					Font: Bold
					Text: button-skirmish-tabs-options-tab
				Button@MUSIC_TAB:
					X: 220
					Y: 67
					Width: 110
					Height: 31
					Font: Bold
					Text: label-music-title
		Container@MULTIPLAYER_TABS:
			X: 20
			Width: 460
			Height: PARENT_HEIGHT
			Visible: False
			Children:
				Button@PLAYERS_TAB:
					Y: 67
					Width: 110
					Height: 31
					Font: Bold
					Text: button-multiplayer-tabs-players-tab
				Button@OPTIONS_TAB:
					X: 110
					Y: 67
					Width: 110
					Height: 31
					Font: Bold
					Text: button-multiplayer-tabs-options-tab
				Button@MUSIC_TAB:
					X: 220
					Y: 67
					Width: 110
					Height: 31
					Font: Bold
					Text: label-music-title
				Button@SERVERS_TAB:
					X: 330
					Y: 67
					Width: 110
					Height: 31
					Font: Bold
					Text: button-multiplayer-tabs-servers-tab
		DropDownButton@SCENARIO_DROPDOWNBUTTON:
			X: PARENT_WIDTH - WIDTH - 20
			Y: 349
			Width: 200
			Height: 30
			Font: Bold
		# SCENARIO_DESCRIPTION widget deleted entirely. LobbyLogic uses GetOrNull
		# so its dynamic GetText handler is skipped when the widget doesn't exist.
		# Previous attempt to hide it via Visible:false didn't work because the
		# engine's IsVisible binding overrode the YAML flag.
		Container@LOBBYCHAT:
			X: 20
			Y: PARENT_HEIGHT - HEIGHT - 75
			Width: PARENT_WIDTH - 40
			Height: 204
			Children:
				ScrollPanel@CHAT_DISPLAY:
					Width: PARENT_WIDTH
					Height: PARENT_HEIGHT - 30
					TopBottomSpacing: 2
					ItemSpacing: 2
				Button@CHAT_MODE:
					Y: PARENT_HEIGHT - HEIGHT
					Width: 50
					Height: 25
					Text: button-lobbychat-chat-mode.label
					Font: Bold
					Key: ToggleChatMode
					TooltipText: button-lobbychat-chat-mode.tooltip
					TooltipContainer: TOOLTIP_CONTAINER
				TextField@CHAT_TEXTFIELD:
					X: 55
					Y: PARENT_HEIGHT - HEIGHT
					Width: PARENT_WIDTH - 55
					Height: 25
		Button@START_GAME_BUTTON:
			X: 20
			Y: PARENT_HEIGHT - HEIGHT - 15
			Width: PARENT_WIDTH - 40
			Height: 45
			Text: button-server-lobby-start-game
			Font: BigBold
		Button@DISCONNECT_BUTTON:
			X: 20
			Y: 16
			Width: 80
			Height: 25
			Text: button-server-lobby-disconnect
			Font: Bold
		Container@FACTION_DROPDOWN_PANEL_ROOT:
		TooltipContainer@TOOLTIP_CONTAINER:
