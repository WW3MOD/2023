Container@LOBBY_OPTIONS_BIN:
	Width: PARENT_WIDTH
	Height: PARENT_HEIGHT
	Children:
		# Title removed — the tab label "Advanced" already names this panel.
		ScrollPanel@OPTIONS_PANEL:
			Logic: LobbyOptionsLogic
			Y: 0
			Width: PARENT_WIDTH
			Height: PARENT_HEIGHT
			Children:
				Label@CATEGORY_FILTER:
					Visible: False
					Text: Advanced
				Container@LOBBY_OPTIONS:
					Y: 5
					Width: PARENT_WIDTH - 24
					Children:
						Container@SECTION_HEADER_TEMPLATE:
							Width: PARENT_WIDTH
							Height: 40
							Visible: False
							Children:
								Button@TOGGLE:
									Width: PARENT_WIDTH
									Height: 40
									Background: ""
								Label@HEADER_LABEL:
									X: 4
									Y: 14
									Width: PARENT_WIDTH - 8
									Height: 22
									Font: MediumBold
									Align: Left
								ColorBlock@SEPARATOR:
									X: 4
									Y: 36
									Width: PARENT_WIDTH - 8
									Height: 1
									Color: 60606080
						Container@CHECKBOX_ROW_TEMPLATE:
							Width: PARENT_WIDTH
							Height: 30
							Children:
								Checkbox@A:
									X: 10
									Width: PARENT_WIDTH / 2 - 20
									Height: 20
									Visible: False
									TooltipContainer: TOOLTIP_CONTAINER
								Checkbox@B:
									X: PARENT_WIDTH / 2 + 10
									Width: PARENT_WIDTH / 2 - 20
									Height: 20
									Visible: False
									TooltipContainer: TOOLTIP_CONTAINER
						Container@DROPDOWN_ROW_TEMPLATE:
							Height: 55
							Width: PARENT_WIDTH
							Children:
								LabelForInput@A_DESC:
									X: 10
									Width: PARENT_WIDTH / 2 - 20
									Height: 20
									Visible: False
									For: A
								DropDownButton@A:
									X: 10
									Width: PARENT_WIDTH / 2 - 20
									Y: 22
									Height: 25
									Visible: False
									TooltipContainer: TOOLTIP_CONTAINER
								LabelForInput@B_DESC:
									X: PARENT_WIDTH / 2 + 10
									Width: PARENT_WIDTH / 2 - 20
									Height: 20
									Visible: False
									For: B
								DropDownButton@B:
									X: PARENT_WIDTH / 2 + 10
									Width: PARENT_WIDTH / 2 - 20
									Y: 22
									Height: 25
									Visible: False
									TooltipContainer: TOOLTIP_CONTAINER
