Container@LOBBY_OPTIONS_BIN:
	Width: PARENT_WIDTH
	Height: PARENT_HEIGHT
	Children:
		Label@TITLE:
			Y: 0 - 24
			Width: PARENT_WIDTH
			Height: 25
			Font: Bold
			Align: Center
			Text: Game Settings
		Container@TAB_BUTTONS:
			Y: 0
			Width: PARENT_WIDTH
			Height: 30
			Children:
				Button@TAB_COMMON:
					X: 2
					Width: PARENT_WIDTH / 2 - 4
					Height: 28
					Font: Bold
					Text: COMMON
				Button@TAB_ADVANCED:
					X: PARENT_WIDTH / 2 + 2
					Width: PARENT_WIDTH / 2 - 4
					Height: 28
					Font: Bold
					Text: ADVANCED
		ScrollPanel@OPTIONS_PANEL:
			Logic: LobbyOptionsLogic
			Y: 34
			Width: PARENT_WIDTH
			Height: PARENT_HEIGHT - 34
			Children:
				Container@LOBBY_OPTIONS:
					Y: 5
					Width: PARENT_WIDTH - 24
					Children:
						Container@SECTION_HEADER_TEMPLATE:
							Width: PARENT_WIDTH
							Height: 26
							Visible: False
							Children:
								Label@HEADER_LABEL:
									X: 4
									Y: 4
									Width: PARENT_WIDTH - 8
									Height: 20
									Font: TinyBold
									Align: Left
						Container@CHECKBOX_ROW_TEMPLATE:
							Width: PARENT_WIDTH
							Height: 30
							Children:
								Checkbox@A:
									X: 10
									Width: PARENT_WIDTH / 2 - 20
									Height: 20
									Visible: False
									TooltipContainer: TOOLTIP_CONTAINER
								Checkbox@B:
									X: PARENT_WIDTH / 2 + 10
									Width: PARENT_WIDTH / 2 - 20
									Height: 20
									Visible: False
									TooltipContainer: TOOLTIP_CONTAINER
						Container@DROPDOWN_ROW_TEMPLATE:
							Height: 55
							Width: PARENT_WIDTH
							Children:
								LabelForInput@A_DESC:
									X: 10
									Width: PARENT_WIDTH / 2 - 20
									Height: 20
									Visible: False
									For: A
								DropDownButton@A:
									X: 10
									Width: PARENT_WIDTH / 2 - 20
									Y: 22
									Height: 25
									Visible: False
									TooltipContainer: TOOLTIP_CONTAINER
								LabelForInput@B_DESC:
									X: PARENT_WIDTH / 2 + 10
									Width: PARENT_WIDTH / 2 - 20
									Height: 20
									Visible: False
									For: B
								DropDownButton@B:
									X: PARENT_WIDTH / 2 + 10
									Width: PARENT_WIDTH / 2 - 20
									Y: 22
									Height: 25
									Visible: False
									TooltipContainer: TOOLTIP_CONTAINER
