Player:
	-ConquestVictoryConditions:
	MapLayers:
		ExploredMapCheckboxEnabled: true
		FogCheckboxEnabled: false

World:
	-StartGameNotification:
	-SpawnStartingUnits:
	-MapStartingLocations:
	-CrateSpawner:
	MusicPlaylist:
		DisableWorldSounds: false
	LuaScript:
		Scripts: test-helpers.lua, demo-wgm-suite.lua

^Combatant:
	AutoTarget:
		ScanRadius: 30
		InitialStance: FireAtWill
		InitialStanceAI: FireAtWill
		InitialEngagementStance: Defensive
		InitialEngagementStanceAI: Defensive
		MinimumScanTimeInterval: 16
		MaximumScanTimeInterval: 32

# Sponge t90 / bmp2 — the controlled lanes use respawning so we'd rather
# they survive a few hits each. Skirmish-zone units inherit the same and
# the respawn logic still applies.
t90:
	Health:
		HP: 60000
bmp2:
	Health:
		HP: 50000
bradley:
	Health:
		HP: 60000
abrams:
	Health:
		HP: 80000
