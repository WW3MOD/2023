	# One Supply Route per side: required so a faction can't be eliminated
	# mid-test (mission-end short-circuits the Lua poller). Targetable.NoAutoTarget
	# elsewhere prevents accidental retarget.
	OwnSR: supplyroute
		Owner: USA
		Location: 4,4
	OpponentSR: supplyroute
		Owner: Russia
		Location: 60,30
	SpawnUSA: mpspawn
		Owner: Neutral
		Location: 12,17
	SpawnRussia: mpspawn
		Owner: Neutral
		Location: 34,17

