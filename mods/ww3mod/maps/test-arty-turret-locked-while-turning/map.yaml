MapFormat: 12

RequiresMod: ww3mod

Title: TEST: Paladin Turret Locked While Turning (auto)

Author: WW3MOD test harness

Tileset: TEMPERAT

MapSize: 66,34

Bounds: 1,1,64,32

Visibility: MissionSelector

Categories: Test

Players:
	PlayerReference@Neutral:
		Name: Neutral
		OwnsWorld: True
		NonCombatant: True
		Faction: america
	PlayerReference@USA:
		Name: USA
		Playable: True
		LockFaction: True
		LockColor: True
		Faction: america
		Color: 4488FF
		Enemies: Russia
	PlayerReference@Russia:
		Name: Russia
		LockFaction: True
		LockColor: True
		Faction: russia
		Color: FF4444
		Enemies: USA

Actors:
	# Paladin starts facing East (768). We order it to move ONE cell west — the
	# unit needs to pivot the body 180° before driving. The pivot makes
	# Mobile.CurrentMovementTypes.Turn true while Horizontal is false.
	Paladin: m109
		Owner: USA
		Location: 32,16
		Facing: 768
	# t90 to the south. Without the Turn-gated lock, the turret would lock onto
	# the t90 the instant horizontal motion stops at the start of the pivot.
	Target: t90
		Owner: Russia
		Location: 32,28
	SpawnUSA: mpspawn
		Owner: Neutral
		Location: 32,16
	SpawnRussia: mpspawn
		Owner: Neutral
		Location: 32,28

Rules: rules.yaml
