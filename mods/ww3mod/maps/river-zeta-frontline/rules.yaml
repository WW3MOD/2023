World:
	LuaScript:
		Scripts: scenario.lua, campaign.lua, river-zeta-frontline.lua
	ScriptLobbyDropdown@difficulty:
		ID: difficulty
		Label: Difficulty
		Description: Controls enemy wave strength and frequency
		Values:
			easy: Easy
			normal: Normal
			hard: Hard
		Default: normal
		DisplayOrder: 0
		Locked: false
		Visible: true

^Combatant:
	AutoTarget:
		ScanRadius: 40
		InitialStance: FireAtWill
		InitialStanceAI: FireAtWill
		InitialEngagementStance: Defensive
		InitialEngagementStanceAI: Defensive
		MinimumScanTimeInterval: 16
		MaximumScanTimeInterval: 32
