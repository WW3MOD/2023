# Test scenario rules — generated for burn-variant comparison.

Player:
	-ConquestVictoryConditions:
	MapLayers:
		ExploredMapCheckboxEnabled: true
		FogCheckboxEnabled: false

World:
	-StartGameNotification:
	-SpawnStartingUnits:
	-MapStartingLocations:
	-CrateSpawner:
	MusicPlaylist:
		DisableWorldSounds: false
	LuaScript:
		Scripts: test-helpers.lua, test-burn-compare.lua

# === V1 max stacks only at HP=0 (slowest possible — death-only inferno) ===
^Burn_V1:
	GrantStackingConditionOnHealthFraction@OnFire:
		Condition: onfire
		StartFraction: 50
		EndFraction: 0
		MaxStacks: 10
		Interval: 15
	WithIdleOverlay@V1_1:
		RequiresCondition: onfire == 1 || onfire == 2
		Image: smoke_mtd
		StartSequence: start
		Sequence: loop
		Palette: temptd
		IsDecoration: true
	WithIdleOverlay@V1_2:
		RequiresCondition: onfire == 3 || onfire == 4
		Image: infantry-burn-1
		StartSequence: start
		Sequence: loop
		Palette: effect
		IsDecoration: true
	WithIdleOverlay@V1_3:
		RequiresCondition: onfire == 5 || onfire == 6
		Image: infantry-burn-3
		StartSequence: start
		Sequence: loop
		Palette: effect
		IsDecoration: true
	WithIdleOverlay@V1_4:
		RequiresCondition: onfire == 7 || onfire == 8
		Image: infantry-burn-4
		StartSequence: start
		Sequence: loop
		Palette: effect
		IsDecoration: true
	WithIdleOverlay@V1_5:
		RequiresCondition: onfire >= 7
		Image: infantry-burn-5
		StartSequence: start
		Sequence: loop
		Palette: effect
		IsDecoration: true
	WithIdleOverlay@V1_6:
		RequiresCondition: onfire == 9 || onfire == 10
		Image: infantry-burn-5
		StartSequence: start
		Sequence: loop
		Palette: effect
		IsDecoration: true
	WithIdleOverlay@V1_7:
		RequiresCondition: onfire >= 9
		Image: fire
		Sequence: 1
		IsDecoration: true

