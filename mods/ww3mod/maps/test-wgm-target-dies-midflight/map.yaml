MapFormat: 12

RequiresMod: ww3mod

Title: TEST: WGM target dies mid-flight (auto)

Author: WW3MOD test harness

Tileset: TEMPERAT

MapSize: 66,34

Bounds: 1,1,64,32

Visibility: MissionSelector

Categories: Test

Players:
	PlayerReference@Neutral:
		Name: Neutral
		OwnsWorld: True
		NonCombatant: True
		Faction: america
	PlayerReference@USA:
		Name: USA
		Playable: True
		LockFaction: True
		LockColor: True
		Faction: america
		Color: 4488FF
		Enemies: Russia
	PlayerReference@Russia:
		Name: Russia
		LockFaction: True
		LockColor: True
		Faction: russia
		Color: FF4444
		Enemies: USA

Actors:
	# Bradley<->t90 distance: 22 cells. WGM range 25c, 25mm Bradley range 20c.
	# So only WGM is in range — isolates the WGM behaviour.
	#
	# One Supply Route per side: required so the Russian faction doesn't
	# get eliminated when we instakill the t90 (otherwise the game ends
	# in Mission Accomplished and the Lua poller never gets a verdict).
	# SR has Targetable.TargetTypes=NoAutoTarget so WGM's operator-retarget
	# can't accidentally redirect onto it. Always include one SR per
	# active faction in test maps — see DOCS/recipes/AUTOTEST.md.
	OwnSR: supplyroute
		Owner: USA
		Location: 4,4
	OpponentSR: supplyroute
		Owner: Russia
		Location: 60,30
	Bradley: bradley
		Owner: USA
		Location: 12,17
		Facing: 768
	Target: t90
		Owner: Russia
		Location: 34,17
	SpawnUSA: mpspawn
		Owner: Neutral
		Location: 12,17
	SpawnRussia: mpspawn
		Owner: Neutral
		Location: 34,17

Rules: rules.yaml

Weapons: weapons.yaml
