Categories: Test

Players:
	PlayerReference@Neutral:
		Name: Neutral
		OwnsWorld: True
		NonCombatant: True
		Faction: america
	PlayerReference@USA:
		Name: USA
		Playable: True
		LockFaction: True
		LockColor: True
		Faction: america
		Color: 4488FF
		Enemies: Russia
	PlayerReference@Russia:
		Name: Russia
		LockFaction: True
