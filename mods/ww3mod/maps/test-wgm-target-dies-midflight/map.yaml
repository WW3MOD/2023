Actors:
	# Bradley<->t90 distance: 22 cells. WGM range 25c, 25mm Bradley range 20c.
	# So only WGM is in range — isolates the WGM behaviour.
	# Filler Russian conscript at the far edge keeps the Russian faction
	# alive (so the game doesn't auto-end on t90 death and trigger Mission
	# Accomplished) but is far out of WGM operator-retarget range, AND is
	# infantry which WGM's `ValidTargets: Vehicle, Defense` excludes — so
	# the missile cannot retarget onto it. Stance HoldFire so it doesn't
	# wander or shoot back.
	Bradley: bradley
		Owner: USA
		Location: 12,17
		Facing: 768
	Target: t90
		Owner: Russia
		Location: 34,17
	Filler: e1.russia
		Owner: Russia
		Location: 60,30
	SpawnUSA: mpspawn
		Owner: Neutral
		Location: 12,17
	SpawnRussia: mpspawn
		Owner: Neutral
		Location: 34,17

Rules: rules.yaml

Weapons: weapons.yaml
