Player:
	-ConquestVictoryConditions:
	MapLayers:
		ExploredMapCheckboxEnabled: true
		FogCheckboxEnabled: false
World:
	-StartGameNotification:
	-SpawnStartingUnits:
	-MapStartingLocations:
	-CrateSpawner:
	MusicPlaylist:
		BackgroundMusic: intro
		AllowMuteBackgroundMusic: true
		DisableWorldSounds: true
	LuaScript:
		Scripts: shellmap-fire-support.lua
	GlobalLightingPaletteEffect:
		Red: 0.9
		Green: 0.9
		Blue: 0.9
		Ambient: 0.9

^ExistsInWorld:
	GivesExperience:
		ActorExperienceModifier: 500

^Combatant:
	AutoTarget:
		ScanRadius: 40
		InitialStance: FireAtWill
		InitialStanceAI: FireAtWill
		InitialEngagementStance: Hunt
		InitialEngagementStanceAI: Hunt
		MinimumScanTimeInterval: 16
		MaximumScanTimeInterval: 32

^SuppressionPips:
	WithDecoration@Suppression_1:
		RequiresSelection: false
	WithDecoration@Suppression_2:
		RequiresSelection: false
	WithDecoration@Suppression_3:
		RequiresSelection: false
	WithDecoration@Suppression_4:
		RequiresSelection: false
	WithDecoration@Suppression_5:
		RequiresSelection: false
	WithDecoration@Suppression_6:
		RequiresSelection: false
	WithDecoration@Suppression_7:
