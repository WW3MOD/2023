
# Crew member actors — ejected from vehicles at critical damage
# These are non-buildable infantry with pistols and the vehicle's rank

^CrewMember:
	Inherits@Soldier: ^Soldier
	Inherits@AutoTarget: ^AutoTargetLMG
	Inherits@Rotting: ^RottingInfantry
	Valued:
		Cost: 100
	Armor:
		Type: None
	Armament@1:
		Name: primary
		Weapon: Pistol
		PauseOnCondition: !ammo-primary
	AmmoPool@1:
		Name: primary-ammo
		Armaments: primary
		Ammo: 24
		AmmoCondition: ammo-primary
		FullReloadTicks: 200
		FullReloadSteps: 4
	WithAmmoPipsDecoration@1:
		Position: Bottom
		Margin: 4, 3
		PipCount: 3
		RequiresSelection: true
		FullSequence: pip-yellow
		AmmoPools: primary-ammo
	GainsExperience:
		ExperienceModifier: 1
	WithDecoration@Class:
		Sequence: empty_class

# === America crew ===

crew.pilot.america:
