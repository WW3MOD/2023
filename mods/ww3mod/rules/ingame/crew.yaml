
# Crew member actors — ejected from vehicles at critical damage
# These are non-buildable infantry with pistols and the vehicle's rank

^CrewMember:
	# Inherit from ^CamoSoldier (not just ^Soldier) so crew gets the same
	# behaviors as every other infantry: InfantryStates (prone on idle /
	# suppressed / critical / deployed), ^Combatant (stance), ^Rotting on
	# death. Without this they stood upright while idle, never took cover
	# from suppression, and didn't lay down at critical HP — felt
	# completely different from other soldiers.
	Inherits@Soldier: ^CamoSoldier
	Inherits@AutoTarget: ^AutoTargetLMG
	Valued:
		Cost: 100
	Armor:
		Type: None
	# Borrow the e1 (conscript) firing sequence — ^Soldier doesn't set
	# DefaultAttackSequence so without this override crew render frozen
	# while firing. e1 sprites already ship the shoot/prone-shoot frames.
	WithInfantryBody:
		IdleSequences: idle1
		DefaultAttackSequence: shoot
	Armament@1:
		Name: primary
		Weapon: Pistol
		PauseOnCondition: !ammo-primary
	AmmoPool@1:
		Name: primary-ammo
		Armaments: primary
		Ammo: 24
		ReloadCount: 8
		AmmoCondition: ammo-primary
		# Pistol: 3 batches × 8 rounds × 1 supply = 3 (~3% of cost 100). Crew
		# aren't usually evac/sold; token cost so sell math stays consistent.
		SupplyValue: 1
	WithAmmoPipsDecoration@1:
		Position: Bottom
		Margin: 4, 3
		PipCount: 3
		RequiresSelection: true
		FullSequence: pip-yellow
		AmmoPools: primary-ammo
	GainsExperience:
		ExperienceModifier: 1
	WithDecoration@Class:
		Sequence: empty_class
	Passenger:
		CustomPipType: empty_class

# === America crew ===

crew.pilot.america:
	Inherits: ^CrewMember
	Tooltip:
		Name: Pilot
	RenderSprites:
		Image: e1.america
		Scale: 0.6
	CrewMember:
		Role: Pilot
	WithDecoration@Class:
		Sequence: pilot_class
	Passenger:
		CustomPipType: pilot_class
	Selectable:
		Class: Pilot

