	EjectOnDeath@Rank0:
		PilotActor: PILOT
		RequiresCondition: airborne && !suppress-eject && !rank-veteran
		SuccessRate: 80
		EjectInAir: true
	EjectOnDeath@Rank1:
		PilotActor: PILOTR1
		RequiresCondition: airborne && !suppress-eject && rank-veteran == 1
		SuccessRate: 80
		EjectInAir: true
	EjectOnDeath@Rank2:
		PilotActor: PILOTR2
		RequiresCondition: airborne && !suppress-eject && rank-veteran == 2
		SuccessRate: 80
		EjectInAir: true
	EjectOnDeath@Rank_3:
		PilotActor: PILOTR3
		RequiresCondition: airborne && !suppress-eject && rank-veteran == 3
		SuccessRate: 80
		EjectInAir: true
	EjectOnDeath@Rank4:
		PilotActor: PILOTR4
		RequiresCondition: airborne && !suppress-eject && rank-veteran >= 4
		SuccessRate: 80
		EjectInAir: true
	DeliversCash@Rotation:
		Type: Rotation
	SelectionPriorityModifier@Evacuating:
		RequiresCondition: evacuating
		Modifier: -20
	WithDecoration@Evacuating:
		Image: pips
		Sequence: pip-orange
		Position: TopRight
		RequiresCondition: evacuating
		ValidRelationships: Ally

^Helicopter:
	Inherits@Type: ^Airborne
	ActorLostNotification:
		Notification: AirUnitLost
	-BodyOrientation:
	Tooltip:
		GenericName: Helicopter
	Aircraft:
		CanHover: True
		CanSlide: True
		VTOL: True
		CruisingCondition: cruising
		WaitDistanceFromResupplyBase: 4c0
		TakeOffOnResupply: true
		LandableTerrainTypes: Clear, Rough, Road, Beach
		Crushes: crate, mine, infantry
		InitialFacing: 224
	AttackAircraft:
		AlignBodyToTarget: true
	GrantConditionOnMovement:
		Condition: moving
	GpsDot:
		String: Helicopter
	Hovers@Cruising:
		RequiresCondition: cruising
	ClassicFacingBodyOrientation:
	Repairable:
		RepairActors: hpad
	Targetable@Helicopter:
		TargetTypes: Helicopter
	DeliversCash@Rotation:
		Type: Rotation
	HeliEmergencyLanding:
		AutorotationDescentRate: 20
		CrashDescentRate: 50
		AutorotationSpeedPercent: 60
		SpinsOnCrash: true
		MaxSpinRate: 80
		SpinAcceleration: 4
		AutorotationCondition: autorotation
		CrashLandingCondition: crash-landing
		DisabledCondition: crash-disabled
		SuppressEjectCondition: suppress-eject
		EjectPassengersOnSafeLanding: true
		EjectPassengersOnCrash: false
		CrashExplosion: UnitExplode
		# Don't transfer to Neutral on safe-land — the airframe stays on its
		# original team (visible team-coloured wreck), burns out via the
		# ChangesHealth@CrashBurn below, and finally explodes when HP hits 0
		# (uses the existing Explodes: !airborne entry from ^NeutralAirborne).
		TransferToNeutralOnSafeLanding: false
	VehicleCrew:
		EjectionDamageState: Dead
		EjectionSurvivalRate: 100
	# Burn after safe-autorotation: bleed -2% MaxHP every 5 ticks once the
	# heli is sitting crash-disabled. ~12-13 seconds from full HP to 0.
	# Cookoff fires via Explodes: !airborne when the bleed kills it.
	ChangesHealth@CrashBurn:
		PercentageStep: -2
		Delay: 5
		RequiresCondition: crash-disabled
	# Staged burning. Same 50%→1% mapping as vehicles. No RequiresCondition —
	# helis show fire while airborne too once they're damaged below 50%; the
	# pilot is in trouble well before they actually start autorotating. Once
	# crash-disabled the existing ChangesHealth@CrashBurn keeps draining HP
	# and the fire keeps climbing until the wreck explodes.
	ExternalCondition@OnFire:
		Condition: onfire
		TotalCap: 10
	GrantStackingConditionOnHealthFraction@OnFire:
		Condition: onfire
		StartFraction: 50
		EndFraction: 1
		MaxStacks: 10
		Interval: 15
	# Same 5-tier visual ramp as ^EffectsWhenDamagedVehicles. Reads the same
	# at every HP fraction so the player learns one ramp for everything.
	WithIdleOverlay@Burn_1:
		RequiresCondition: onfire == 1 || onfire == 2
		Image: infantry-burn-1
		StartSequence: start
		Sequence: loop
		Palette: effect
		IsDecoration: true
	WithIdleOverlay@Burn_2:
		RequiresCondition: onfire == 3 || onfire == 4
		Image: infantry-burn-2
		StartSequence: start
		Sequence: loop
		Palette: effect
		IsDecoration: true
	WithIdleOverlay@Burn_3:
		RequiresCondition: onfire == 5 || onfire == 6
		Image: infantry-burn-3
		StartSequence: start
		Sequence: loop
		Palette: effect
		IsDecoration: true
	WithIdleOverlay@Burn_4:
		RequiresCondition: onfire == 7 || onfire == 8
		Image: infantry-burn-4
		StartSequence: start
		Sequence: loop
		Palette: effect
		IsDecoration: true
	WithIdleOverlay@Burn_5:
		RequiresCondition: onfire == 9 || onfire == 10
		Image: infantry-burn-5
		StartSequence: start
		Sequence: loop
		Palette: effect
		IsDecoration: true
	WithIdleOverlay@Inferno:
		RequiresCondition: onfire >= 9
		Image: fire
		Sequence: 1
		IsDecoration: true
	SpeedMultiplier@CrashDisabled:
		Modifier: 0
		RequiresCondition: crash-disabled
	ExternalCondition@HasPilot:
		Condition: has-pilot
	ExternalCondition@HasCopilot:
		Condition: has-copilot
	ExternalCondition@HasGunner:
		Condition: has-gunner
	SpeedMultiplier@NoPilot:
		Modifier: 0
		RequiresCondition: !has-pilot && !crash-disabled
	SpeedMultiplier@NoCopilot:
		Modifier: 75
		RequiresCondition: !has-copilot
	FirepowerMultiplier@CrashDisabled:
		Modifier: 0
		RequiresCondition: crash-disabled
	FirepowerMultiplier@NoGunner:
		Modifier: 0
		RequiresCondition: !has-gunner
	FirepowerMultiplier@EmergencyDescent:
		Modifier: 0
		RequiresCondition: autorotation || crash-landing
	# RepairableBuilding@CrashDisabled and Targetable@VehicleRepair removed
	# 260509: the crash-disabled-then-repair-and-fly-again concept was scrapped.
	# Safe-landed helis simply burn out and explode (ChangesHealth@CrashBurn above).

