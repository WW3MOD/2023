
^NeutralAirborne:
	Inherits@ExistsInWorld: ^ExistsInWorld
	Inherits@SpriteActor: ^SpriteActor
	Inherits@Bounty: ^GlobalBounty
	Inherits@Selection: ^SelectableCombatUnit
	Inherits@WhenDamagedAir: ^WhenDamagedAir
	Inherits@EMPMechanic: ^AircraftAffectedByEMP
	Inherits@Handicaps: ^PlayerHandicaps
	Inherits@DamageStates: ^DamageStates
	Inherits@AmmoDecoration: ^AmmoDecoration
	Inherits@Vision: ^StandardVision
	Inherits@DamagePips: ^DamageVehiclePips
	Huntable:
	OwnerLostAction:
		Action: Kill
	DrawLineToTarget:
	Armor:
		Type: Light
		Thickness: 3
	UpdatesPlayerStatistics:
	AppearsOnMiniMap:
		UseLocation: true
	WithSpriteControlGroupDecoration:
	Selectable:
		Bounds: 1024,1024
	Aircraft:
		AirborneCondition: airborne
	Targetable@Ground:
		RequiresCondition: !airborne
		TargetTypes: Ground, Vehicle
	Targetable@Airborne:
		RequiresCondition: airborne
		TargetTypes: Air, AirDetonateAttack
	Targetable@REPAIR:
		RequiresCondition: !airborne && damaged
		TargetTypes: Repair
	Detectable:
		Radar: 1
		RadarDetectableCondition: airborne
		Position: Ground
	DetectableAddativeModifier@Ground:
		RequiresCondition: !airborne
		VisionModifier: 3
	AttackMove:
	Guard:
	Guardable:
	ProximityCaptor:
		Types: Plane
	GpsDot:
		String: Plane
	Tooltip:
		GenericName: Plane
	WithShadow:
		Offset: 43, 128, 0
		ZOffset: -129
	WithFacingSpriteBody:
	MustBeDestroyed:
	Voiced:
		VoiceSet: GenericVoice
	HitShape:
		Type: Circle
			Radius: 32
	MapEditorData:
		Categories: Aircraft
	Explodes:
		Weapon: UnitExplode
		RequiresCondition: !airborne
	ExternalCondition@UNITDOCKED:
		Condition: unit.docked

^Airborne:
	Inherits: ^NeutralAirborne
	Inherits@UnitExperience: ^GainsExperience
	Repairable:
		RepairActors: afld
	Aircraft:
		TakeOffOnCreation: False

^AirRadar:
	Radar:
		Range: 24c0
		RequiresCondition: airborne
	WithRangeCircle@Radar:
		Range: 24c0
		Color: 000000
		Width: 5
		Alpha: 50
		RequiresCondition: airborne

^Aircraft:
	Inherits@Type: ^Airborne
	ActorLostNotification:
		Notification: AirUnitLost
	IndirectFire:
		RequiresCondition: airborne
	EjectOnDeath@Rank0:
		PilotActor: PILOT
		RequiresCondition: airborne && !suppress-eject && !rank-veteran
		SuccessRate: 80
		EjectInAir: true
	EjectOnDeath@Rank1:
		PilotActor: PILOTR1
		RequiresCondition: airborne && !suppress-eject && rank-veteran == 1
		SuccessRate: 80
		EjectInAir: true
	EjectOnDeath@Rank2:
		PilotActor: PILOTR2
		RequiresCondition: airborne && !suppress-eject && rank-veteran == 2
		SuccessRate: 80
		EjectInAir: true
	EjectOnDeath@Rank_3:
		PilotActor: PILOTR3
		RequiresCondition: airborne && !suppress-eject && rank-veteran == 3
		SuccessRate: 80
		EjectInAir: true
	EjectOnDeath@Rank4:
		PilotActor: PILOTR4
		RequiresCondition: airborne && !suppress-eject && rank-veteran >= 4
		SuccessRate: 80
		EjectInAir: true
	DeliversCash@Rotation:
		Type: Rotation
	SelectionPriorityModifier@Evacuating:
		RequiresCondition: evacuating
		Modifier: -20
	WithTextDecoration@Evacuating:
		Text: EVA
		RequiresCondition: evacuating
		Position: TopRight
		Color: FFE040
		Font: TinyBold

^Helicopter:
	Inherits@Type: ^Airborne
	ActorLostNotification:
		Notification: AirUnitLost
	IndirectFire:
		RequiresCondition: airborne
	-BodyOrientation:
	Tooltip:
		GenericName: Helicopter
	Aircraft:
		CanHover: True
		CanSlide: True
		VTOL: True
		CruisingCondition: cruising
		WaitDistanceFromResupplyBase: 4c0
		TakeOffOnResupply: true
		LandableTerrainTypes: Clear, Rough, Road, Beach
		Crushes: crate, mine, infantry
		InitialFacing: 224
	AttackAircraft:
		AlignBodyToTarget: true
	GrantConditionOnMovement:
		Condition: moving
	GpsDot:
		String: Helicopter
	Hovers@Cruising:
		RequiresCondition: cruising
	ClassicFacingBodyOrientation:
	Repairable:
		RepairActors: hpad
	Targetable@Helicopter:
		TargetTypes: Helicopter
	DeliversCash@Rotation:
		Type: Rotation
	HeliEmergencyLanding:
		AutorotationDescentRate: 20
		CrashDescentRate: 50
		AutorotationSpeedPercent: 60
		SpinsOnCrash: true
		MaxSpinRate: 80
		SpinAcceleration: 4
		AutorotationCondition: autorotation
		CrashLandingCondition: crash-landing
		DisabledCondition: crash-disabled
		SuppressEjectCondition: suppress-eject
		EjectPassengersOnSafeLanding: true
		EjectPassengersOnCrash: false
		CrashExplosion: UnitExplode
		TransferToNeutralOnSafeLanding: true
	VehicleCrew:
		EjectionDamageState: Dead
		EjectionSurvivalRate: 100
	SpeedMultiplier@CrashDisabled:
		Modifier: 0
		RequiresCondition: crash-disabled
	SpeedMultiplier@NoPilot:
		Modifier: 0
		RequiresCondition: !has-pilot && !crash-disabled
	SpeedMultiplier@NoCopilot:
		Modifier: 75
		RequiresCondition: !has-copilot
	FirepowerMultiplier@CrashDisabled:
		Modifier: 0
		RequiresCondition: crash-disabled
	FirepowerMultiplier@NoGunner:
		Modifier: 0
		RequiresCondition: !has-gunner
	FirepowerMultiplier@EmergencyDescent:
		Modifier: 0
		RequiresCondition: autorotation || crash-landing
	RepairableBuilding@CrashDisabled:
		RequiresCondition: crash-disabled
		RepairStep: 400
		RepairInterval: 20
		ValidRelationships: Ally, Neutral, Enemy
	Targetable@VehicleRepair:
		RequiresCondition: crash-disabled && damaged
		TargetTypes: VehicleRepair

^Drone:
	Inherits: ^Airborne
	-Voiced:
	ExternalCondition@DroneDisable:
		Condition: dronedisable
	Aircraft:
		PauseOnCondition: dronedisable
		CanHover: True
		CruisingCondition: cruising
		WaitDistanceFromResupplyBase: 4c0
		TakeOffOnResupply: true
		VTOL: true
		LandableTerrainTypes: None
		Crushes: None
		InitialFacing: 224
		CanSlide: False
	VisionModifier@DroneDisable:
		RequiresCondition: dronedisable
		Modifier: 0
	WithColoredOverlay@DroneDisable:
		RequiresCondition: dronedisable
	WithIdleOverlay@DroneDisable:
		Sequence: emp-overlay
		RequiresCondition: dronedisable
	Armor:
		Type: Unarmored
	HitShape:
		Type: Circle
			Radius: 1
	Targetable@Drone:
		TargetTypes: Drone

^WhenDamagedAir:
	SpeedMultiplier@HeavyDamage:
		Modifier: 90
		RequiresCondition: heavy-damage-attained
	SpeedMultiplier@CriticalDamage:
		Modifier: 75
		RequiresCondition: critical-damage
	InaccuracyMultiplier@HeavyDamage:
		Modifier: 75
		RequiresCondition: heavy-damage-attained
	InaccuracyMultiplier@CriticalDamage:
		Modifier: 50
		RequiresCondition: critical-damage
	BurstWaitMultiplier@HeavyDamage:
		Modifier: 75
		RequiresCondition: heavy-damage-attained
	BurstWaitMultiplier@CriticalDamage:
		Modifier: 50
		RequiresCondition: critical-damage

