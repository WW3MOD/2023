
btr:
	Inherits@Type: ^WheeledVehicle
	Inherits@Crew: ^CrewedVehicle2
	Inherits@CargoPips: ^CargoPips
	Inherits@GainsExperience: ^GainsExperience
	Inherits@AutoTarget: ^AutoTargetHMG
	VehicleCrew:
		CrewSlots: Driver, Gunner
		CrewActors:
			Driver: crew.driver.russia
			Gunner: crew.gunner.russia
		SlotConditions:
			Driver: has-driver
			Gunner: has-gunner
		EjectionOrder: Gunner, Driver
		EjectionDelay: 20
		EjectionDelayVariance: 8
		# Wheeled APC — thinner armor than M113, lower crew survival.
		CrewDamageThresholdPercent: 22
		EjectionSurvivalRate: 70
	Tooltip:
		Name: BTR-80
		GenericName: Armoured Personnel Carrier
	AnnounceOnSeen:
		Type: Vehicle
		TextNotification: Spotted: BTR
	ActorLostNotification:
		TextNotification: Lost: BTR
	Buildable:
		Queue: Vehicle
		BuildPaletteOrder: 10
		Prerequisites: ~player.russia, ~vehicles.russia, ~techlevel.medium
		Description: Wheeled amphibious APC.\n\n - 14.5mm machine gun\n - Carries 8 infantry\n - Armor: Light
		IconPalette: chrome
	RenderSprites:
		Scale: 0.9
	Valued:
		Cost: 600
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Health:
		HP: 14000
	Armor:
		Type: Light
		Thickness: 10
		Distribution: 100,80,80,80,60
	Targetable:
		TargetTypes: Ground, Vehicle, Light
	HitShape:
		Type: Rectangle
			VerticalTopOffset: 480
			TopLeft: -290, -770
			BottomRight: 290, 770
	Mobile:
		Locomotor: lighttracked-amphibious
		Speed: 110
		Acceleration: 2, 3, 4, 3, 2, 1
		TurnSpeed: 10
	Armament@1:
		Name: primary
		Weapon: 12.7mm.MG
		LocalOffset: 300,0,120
		MuzzleSequence: muzzle
		PauseOnCondition: !ammo-primary || empdisable || critical-damage
	AmmoPool@1:
		Name: primary-ammo
		Armaments: primary
		Ammo: 500
		AmmoCondition: ammo-primary
		RearmSound: minelay1.aud
		SupplyValue: 5
		CreditValue: 5
	WithAmmoPipsDecoration@1:
		Position: Bottom
		Margin: 7, 3
		PipCount: 5
		RequiresSelection: true
		FullSequence: pip-yellow
		AmmoPools: primary-ammo
	RenderRangeCircle@1:
		Armament: primary
		RangeCircleType: bullet
		Color: FFFF00
		Width: 1
	Rearmable:
		RearmActors: logisticscenter
		AmmoPools: primary-ammo
	AttackTurreted:
		TargetFrozenActors: True
		PauseOnCondition: empdisable
	Turreted:
		TurnSpeed: 20
		Offset: 100,0,120
	WithSpriteTurret:
	WithMuzzleOverlay:
	Cargo:
		Types: Infantry
		MaxWeight: 8
		LoadedCondition: loaded
		LoadingCondition: notmobile
		EjectOnDeath: True
	WithCargoPipsDecoration:
	Carryable:
		LocalOffset: 0,0,100
		RequiresCondition: !loaded
	Passenger:
		CustomPipType: pip-green
	SpawnActorOnDeath:
		Actor: btr.husk

