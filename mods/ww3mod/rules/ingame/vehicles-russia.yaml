iskander:
	Inherits@Type: ^WheeledVehicle
	Inherits@GainsExperience: ^GainsExperience
	Inherits@AutoTarget: ^AutoTargetGroundAssaultMove
	Buildable:
		Queue: Vehicle
		BuildPaletteOrder: 70
		Prerequisites: ~player.russia, ~vehicles.russia, ~techlevel.high
		Description: Ballistic missile launcher.\n\n - 2x high-impact missiles\n - Long-range precision strikes\n - Armor: Light
	Valued:
		Cost: 6000
	Tooltip:
		Name: Iskander
	AnnounceOnSeen:
		Type: Vehicle
		TextNotification: Spotted: Iskander
	ActorLostNotification:
		TextNotification: Lost: Iskander
	RenderSprites:
		Scale: 1.25
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	DamageMultiplier@Loaded:
		RequiresCondition: loaded
		Modifier: 1000
	Health:
		HP: 10000
	Armor:
		Type: Light
		Thickness: 15
		Distribution: 100,80,80,80,60
	Targetable:
		TargetTypes: Ground, Vehicle, Light
	HitShape:
		Type: Rectangle
			VerticalTopOffset: 650
			TopLeft: -300, -1270
			BottomRight: 300, 1270
	Detectable:
		RadarDetectableCondition: firing
		Position: Ground
	Mobile:
		Speed: 80
		TurnSpeed: 5
		Voice: Move
		PauseOnCondition: firing || being-captured || empdisable
	GrantConditionOnPreparingAttack:
		Condition: firing
		ArmamentNames: primary
		RevokeDelay: 150
	IndirectFire:
	AutoTarget:
		InitialStance: HoldFire
		InitialStanceAI: FireAtWill
	Passenger:
		Voice: Move
	Armament@1:
		Weapon: IskanderTargeter
		LocalOffset: -150,120,150, -150,-100,150 #BM - Where each missile spawns when fired (per barrel, in launcher-local coords). X=forward(+)/back(-), Y=right(+)/left(-), Z=up. Two barrels: right tube then left tube. Should match the WithWeaponOverlay positions below so the missile doesn't visually jump on launch.
		PauseOnCondition: !ammo-primary || empdisable || unit.docked || critical-damage
		RequiresForceFire: True
		AimingDelay: 40
	AmmoPool@1:
		Name: primary-ammo
		Armaments: primary
		Ammo: 2
		AmmoCondition: ammo-primary
		RearmSound: minelay1.aud
		SupplyValue: 1500
		CreditValue: 1500
	RenderRangeCircle@1:
		Armament: primary
		RangeCircleType: explosive
		Color: FF0000
		Width: 5
	Rearmable:
		RearmActors: logisticscenter
		AmmoPools: primary-ammo
	ExternalCondition@VehicleReplenish:
		Condition: replenish-vehicles
	AttackFrontal:
		TargetFrozenActors: True
		ForceFireIgnoresActors: True
		FacingTolerance: 0
		Voice: Attack
		PauseOnCondition: empdisable
		FacingLockCondition: firing
		HoldFireWhileMoving: True
		SetupTicks: 100
		PersistsAtLastTargetPosition: true #BM - Don't cancel mid-salvo if the target dies between launches; commit to firing all loaded missiles at the original target position.
	WithFacingSpriteBody:
		Sequence: empty-idle
	WithWeaponOverlay@Missile_1:
		Sequence: missile
		Offset: -150,130,150 #BM - Position of the RIGHT loaded missile sprite on the launcher (visible when 2 missiles loaded). Should match the right-tube LocalOffset above so the missile doesn't visually jump on launch.
		RequiresCondition: ammo-primary == 2
	WithWeaponOverlay@Missile_2:
		Sequence: missile
		Offset: -150,-100,150 #BM - Position of the LEFT loaded missile sprite (visible when 1 or 2 missiles loaded). Should match the left-tube LocalOffset above.
		RequiresCondition: ammo-primary
	MissileSpawnerMaster:
		Actors: IskanderMissile
		LoadedCondition: loaded
		LaunchingCondition: firing
	Voiced:
		VoiceSet: IskanderVoice
	Explodes:
		RequiresCondition: !loaded
		Weapon: ArtilleryExplode
	Explodes@Loaded:
		RequiresCondition: loaded
		Weapon: IskanderExplosion
	SpawnActorOnDeath:
		Actor: iskander.husk

IskanderMissile:
	Inherits: ^ShootableMissile
	Valued:
		Cost: 50
	Tooltip:
		Name: Iskander missile
	RenderSprites:
		Scale: 1.25 #BM - Sprite size in flight. Should match (or be close to) the launcher's RenderSprites.Scale so the missile looks the same size on the launcher and in the air.
	Health:
		HP: 100
	BallisticMissile:
		LaunchAngle: 110 #BM - Pitch angle of the launch in WAngle units (1024 = 360°, so 110 ≈ 38.7°). Controls the parabolic arc steepness — higher = taller/shorter arc, also the angle the missile erects to before firing. Iskander uses higher (steeper) than HIMARS.
		Speed: 600 #BM - Maximum horizontal cruise speed in WDist/tick. Caps how fast the missile can fly during the climb/cruise portion of the arc.
		Acceleration: 3 #BM - Speed gained per tick (WDist/tick²) while accelerating up to Speed. Lower = slower ramp-up = more dramatic visible launch. 0 disables acceleration (constant speed).
		InitialSpeedPercent: 0 #BM - Starting speed as a percentage of Speed when Acceleration > 0. 0 = starts from rest, 100 = no visible acceleration. Iskander starts from rest for that "lifting off" feel.
		LaunchRiseTicks: 60 #BM - Ticks the erection animation takes (45 ticks ≈ 1.8s at 25 fps). The missile tilts from horizontal to LaunchAngle over this period using cubic ease-in.
		LaunchRiseErect: true #BM - Enables the tilt-up-before-flight animation. Set false (or omit) for HIMARS-style "fire straight from tube" launchers.
		LaunchRiseErectVisualOffset: -300, 0, 200 #BM - Sprite center offset (forward, lateral, up in WDist) at FULL erection, relative to spawn. Tune visually: negative forward slides the sprite back, positive up lifts it. Interpolated linearly with the rotation. Try (0,0,0) first if your sprite hot-spot is at the missile tail (sprite then rotates in place around its anchor).
		PostErectionWaitTicks: 20 #BM - Ticks to wait after the erection completes before the missile ignites and flies (25 ≈ 1s). Gives a visible pause between "fully raised" and "rocket motor lights".
		IgnitionCondition: ignited #BM - Condition granted to the missile when it ignites (used by LeavesTrailsCA below to gate the exhaust trail so it only appears after the rocket lights, not during erection).
		VisualPitchMultiplier: 47 #BM - How much the missile sprite tilts during flight to fake a 3D pitch (percentage). 0 = no tilt (sprite stays horizontal), higher = more tilt. Above ~30 the sprite can look weird at certain facings since it's a 2D fake.
		TerminalSpeed: 600 #BM - Maximum speed in WDist/tick during the dive phase (past the arc apex). Set higher than Speed for a "speeds up on the way down" effect. 0 = no terminal phase.
		TerminalAcceleration: 10 #BM - Acceleration per tick during the terminal dive (WDist/tick²). Only used when TerminalSpeed > 0. If 0, falls back to the regular Acceleration value.
	LeavesTrailsCA:
		Image: smokey2
		Palette: effect_ts
		MovingInterval: 1
		Type: CenterPosition
		Offsets: -650, 0, 200 #BM - Where exhaust puffs spawn relative to the missile center, rotated by missile facing. -200 X = 200 WDist behind the missile (toward the tail). Increase magnitude to push the trail further behind.
		RequiresCondition: ignited
	MissileSpawnerSlave:
	SpawnedExplodes:
		Weapon: IskanderExplosion
		EmptyWeapon: VisualExplodeHusk
		RequiresCondition: !airborne
	Explodes:
		Weapon: IskanderExplosion
		RequiresCondition: airborne

