
^Vehicle:
	Inherits@ExistsInWorld: ^ExistsInWorld
	Inherits@3: ^ClassicFacingSpriteActor
	Inherits@Bounty: ^GlobalBounty
	Inherits@Selection: ^SelectableCombatUnit
	Inherits@EMPMechanic: ^AffectedByEMP
	Inherits@Slowdown: ^EffectsWhenDamagedVehicles
	Inherits@Handicaps: ^PlayerHandicaps
	Inherits@DamageStates: ^DamageStates
	Inherits@AmmoDecoration: ^AmmoDecoration
	Inherits@Vision: ^StandardVision
	Inherits@DamagePips: ^DamageVehiclePips
	Health:
		HP: 5000
	Armor:
		Distribution: 100,50,25,10,10
	# BlocksProjectiles:
	HitShape:
		Type: Rectangle
			VerticalTopOffset: 420
			TopLeft: -350, -500
			BottomRight: 350, 500
	ExternalCondition@UNITDOCKED:
		Condition: unit.docked
	Huntable:
	OwnerLostAction:
		Action: Kill
	DrawLineToTarget:
	UpdatesPlayerStatistics:
	Mobile:
		PauseOnCondition: !(!empdisable && !being-captured)
		Locomotor: wheeled
		TurnSpeed: 20
	SelectionDecorations:
	WithSpriteControlGroupDecoration:
	Selectable:
		Bounds: 1024, 1024
	Targetable:
		RequiresCondition: !parachute
		TargetTypes: Ground, Vehicle
	Targetable@EMPTargeting:
		TargetTypes: EMPTank
		RequiresCondition: empdisable
	Targetable@VehicleRepair:
		RequiresCondition: damaged
		TargetTypes: VehicleRepair
	Targetable@REPAIR:
		TargetTypes: Repair
	Repairable:
		RepairActors: logisticscenter
		PercentageStep: 3
	Chronoshiftable:
	Passenger:
		Weight: 10
		CargoType: Vehicle
	AttackMove:
	Detectable:
	ProximityCaptor:
		Types: Vehicle
	GpsDot:
		String: Vehicle
	WithDamageOverlay:
	Guard:
	Guardable:
	Tooltip:
		GenericName: Vehicle
	CaptureManager:
		BeingCapturedCondition: being-captured
	Capturable:
		Types: vehicle
		CancelActivity: True
	CaptureNotification:
		Notification: UnitStolen
	MustBeDestroyed:
	Voiced:
		VoiceSet: VehicleVoice
	Parachutable:
		FallRate: 26
		KilledOnImpassableTerrain: true
		ParachutingCondition: parachute
	WithFacingSpriteBody:
	WithParachute:
		ShadowImage: parach-shadow
		ShadowSequence: idle
		Image: maxichute
		Sequence: idle
		OpeningSequence: open
		Offset: 0,0,200
		RequiresCondition: parachute
	EdibleByLeap:
	TemporaryOwnerManager:
	MapEditorData:
		Categories: Vehicle
	DeliversCash@Rotation:
		Type: Rotation
	InfersUpkeep:
		PermilleCost: 5

^WheeledVehicle:
	Inherits@Type: ^Vehicle
	Passenger:
		Weight: 15
		CargoType: Vehicle
^TrackedVehicle:
	Inherits@Type: ^Vehicle
	Mobile:
		Locomotor: tracked
	Passenger:
		Weight: 20
		CargoType: Vehicle
^Walker:
	Inherits: ^Vehicle
	Tooltip:
		GenericName: Walker
	Mobile:
		Speed: 70
		Locomotor: walker
		TurnSpeed: 10
		PauseOnCondition: empdisable
	QuantizeFacingsFromSequence:
		Sequence: stand
	-WithFacingSpriteBody:
	WithInfantryBody:

^EffectsWhenDamagedVehicles:
	SpeedMultiplier@HeavyDamage:
		Modifier: 50
		RequiresCondition: heavy-damage-attained
	SpeedMultiplier@CriticalDamage:
		Modifier: 0
		RequiresCondition: critical-damage
	ChangesHealth@Burning:
		PercentageStep: -1
		Delay: 5
		StartIfBelow: 25
		# DamageTypes: BurnoutOutDeath

	# BurstWaitMultiplier@CriticalDamage:
	# 	Modifier: 0
	# 	RequiresCondition: critical-damage
	# Turreted:
	# 	TurnSpeed: 0w

^EffectsWhenMovingVehicles:
	InaccuracyMultiplier@Moving:
		RequiresCondition: moving
		Modifier: 150

MSAR:
	Inherits@Type: ^WheeledVehicle
	Inherits@Selection: ^SelectableSupportUnit
	Tooltip:
		Name: Ranging system
	ActorLostNotification:
		TextNotification: Lost: Ranging system
	AnnounceOnSeen:
		Type: SupportVehicle
		TextNotification: Spotted: Ranging system
	Buildable:
		Queue: Vehicle
		BuildPaletteOrder: 99
		IconPalette: chrometd
		Prerequisites: ~techlevel.medium
		BuildDurationModifier: 50
		Description: The ranging system is intended to locate artillery batteries from the sound of gunfire to facilitate effective counter artillery fire.\n\n - Deploys\n - Light armor.
	Valued:
		Cost: 1500
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Armor:
		Type: Light
	Targetable:
		TargetTypes: Ground, Vehicle, Light
	Mobile:
		Locomotor: wheeled
		Speed: 72
		RequiresCondition: !deployed
		ImmovableCondition: deployed
		RequireForceMoveCondition: !undeployed
	Radar:
		Range: 42c0
		RequiresCondition: deployed
	WithRangeCircle@Radar:
		Range: 42c0
		Color: 000000
		Width: 5
		Alpha: 50
		RequiresCondition: deployed
	Repairable:
		RequireForceMoveCondition: !undeployed
	Passenger:
		RequireForceMoveCondition: !undeployed
	GrantCondition@PreviewWorkaround:
		Condition: real-actor
	GrantConditionOnDeploy:
		PauseOnCondition: empdisable || being-captured
		DeployedCondition: deployed
		UndeployedCondition: undeployed
		Facing: 660
		AllowedTerrainTypes: Clear, Road, Rough
		DeploySounds: placbldg.aud
		UndeploySounds: clicky1.aud
		UndeployOnMove: true
		UndeployOnPickup: true
	WithMakeAnimation:
		BodyNames: deployedbody
	WithSpriteBody@deployed:
		Sequence: idle-static
		RequiresCondition: !undeployed && real-actor
		Name: deployedbody
	Carryable:
		LocalOffset: 0,0,150
	WithFacingSpriteBody:
		RequiresCondition: !deployed
	RenderSprites:
		Image: msar
		PlayerPalette: playertd
	SpawnActorOnDeath:
		RequiresCondition: !deployed
		Actor: MSAR.husk
	SpawnActorOnDeath@deployed:
		RequiresCondition: deployed
		Actor: MSAR.deployed.husk
	# RangedGpsMiniMapProvider:
	# 	Range: 50c0
	# 	RequiresCondition: deployed && !empdisable

MNLY:
	Inherits@Type: ^TrackedVehicle
	Inherits@Selection: ^SelectableSupportUnit
	Buildable:
		Queue: Vehicle
		BuildPaletteOrder: 98
		Prerequisites: ~techlevel.medium
		Description: Carries 10 land mines effective against vehicles and infantry.
	Valued:
		Cost: 600
	Tooltip:
		Name: Minelayer
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Armor:
		Type: Light
	Targetable:
		TargetTypes: Ground, Vehicle, Light
	Mobile:
		Speed: 85
	Minelayer:
		Mine: MINV
		AmmoPoolName: mines-ammo
		TileUnknownName: build-valid
		TerrainTypes: Clear, Road, Beach, Rough, Bridge
	# MineImmune: # if friendly mines?
	AmmoPool:
		Name: mines-ammo
		Ammo: 10
		AmmoCondition: ammo-mines
		FullReloadTicks: 200
		FullReloadSteps: 5
		RearmSound: minelay1.aud
	WithAmmoPipsDecoration:
		Position: Bottom
		Margin: 7,3
		PipCount: 5
		RequiresSelection: true
		FullSequence: pip-white
		AmmoPools: mines-ammo
		RequiresCondition: ammo-mines
	Rearmable:
		RearmActors: logisticscenter
		AmmoPools: mines-ammo
	# DetectCloaked:
	# 	Range: 4c0
	# 	DetectionTypes: Mine
	Passenger:
		CustomPipType: pip-blue
	RenderSprites:
		Image: MNLY
	Carryable:
		LocalOffset: 0,0,100
	WithDecoration@AMMO_MINES_NONE:
		RequiresSelection: false
		Image: pips
		Sequence: pip-ammo-none
		Position: Top
		Margin: 0,-5
		RequiresCondition: !ammo-mines
		BlinkInterval: 16
		BlinkPattern: Off,On
	WithDamageOverlay:
		Image: smoke_mtd
		Palette: temptd
	Explodes:
		Weapon: ArtilleryExplode
	SpawnActorOnDeath:
		Actor: MNLY.husk

TRUK:
	Inherits@Type: ^WheeledVehicle
	Inherits@Selection: ^SelectableSupportUnit
	Buildable:
		Queue: Vehicle
		BuildPaletteOrder: 103
		Prerequisites: ~techlevel.low
		Description: Carries ammunition to resupply soldiers on the battlefield.\n\n - Unarmed.\n - Unarmored.\n - Only replenishes infantry.
	Valued:
		Cost: 600
	Tooltip:
		Name: Supply Truck
	AnnounceOnSeen:
		Type: SupportVehicle
		TextNotification: Spotted: Supply truck
	ActorLostNotification:
		TextNotification: Lost: Supply Truck
	Armor:
		Type: Unarmored
	Targetable:
		TargetTypes: Ground, Vehicle, Unarmored
		RequiresCondition: !parachute
	Mobile:
		Locomotor: wheeled
		Speed: 75
		Acceleration: 7, 6, 5, 4, 3, 2, 1
	Carryable:
		LocalOffset: 0,0,100
	Passenger:
		CustomPipType: pip-blue
	RearmsUnits:
		CloseEnough: 1c0
	ProximityExternalCondition@ReplenishSoldiers:
		Condition: replenish-soldiers
		Range: 4c0
		RequiresCondition: !disabled && !mobile
		ValidRelationships: Ally
	Armament@ReplenishSoldiersTargeter:
		Name: replenish
		Weapon: ReplenishSoldiersTargeter
		Cursor: guard
		OutsideRangeCursor: guard
	AttackTurreted:
		Armaments: replenish
	Turreted:
	WithDamageOverlay:
		Image: smoke_mtd
		Palette: temptd
	Explodes:
		Weapon: ArtilleryExplode
	SpawnActorOnDeath:
		Actor: TRUK.husk

LCCV:
	Inherits@Type: ^WheeledVehicle
	Inherits@Selection: ^SelectableSupportUnit
	Buildable:
		Queue: Vehicle
		BuildPaletteOrder: 150
		Prerequisites: ~techlevel.low
		Description: Deploys into a Logistics Center, capable of rearming vehicles and infantry on the field.
	Valued:
		Cost: 2000
	Tooltip:
		Name: Logistics Center MCV
	Selectable:
		DecorationBounds: 1792,1792
	Armor:
		Type: Light
	Targetable:
		TargetTypes: Ground, Vehicle, Light
	Mobile:
		Speed: 71
		Locomotor: heavywheeled
	Transforms:
		IntoActor: logisticscenter
		Offset: -1,-1
		Facing: 384
		TransformSounds: placbldg.aud, build5.aud
		NoTransformNotification: BuildingCannotPlaceAudio
		PauseOnCondition: empdisable
	MustBeDestroyed:
		RequiredForShortGame: true
	SpawnActorOnDeath:
