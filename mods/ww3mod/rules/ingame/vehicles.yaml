	Passenger:
		Weight: 30
		CustomPipType: pip-blue
	GpsDot:
		String: MCV
	WithDamageOverlay:
		Image: smoke_mtd
		Palette: temptd
	Explodes:
		Weapon: ArtilleryExplode
	RenderSprites:
		Image: mcv
		Scale: 0.8

