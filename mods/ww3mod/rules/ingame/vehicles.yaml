^EffectsWhenDamagedVehicles:
	SpeedMultiplier@HeavyDamage:
		Modifier: 50
		RequiresCondition: heavy-damage-attained
	ChangesHealth@CriticalDamage:
		PercentageStep: -1
		Delay: 5
		StartIfBelow: 50
		# DamageTypes: BurnoutOutDeath
	Targetable@CriticalDamage:
		RequiresCondition: !parachute
		TargetTypes: CriticalDamage
	WithSequentialAnimation@CriticalDamage:
		RequiresCondition: critical-damage
		Image: smoke_mtd
		Palette: temptd
	# Fire overlay on top of the smoke once the vehicle is in Critical state.
	# Same pattern husks.yaml uses for burning structures (Image: fire, Sequence: 1).
	# Multi-stage fire intensity (1..10 as HP → 0) is logged as polish — would
	# need a per-HP-bucket condition system or a custom trait.
	WithIdleOverlay@CriticalFire:
		RequiresCondition: critical-damage
		Image: fire
		Sequence: 1
		IsDecoration: true
	SpeedMultiplier@CriticalDamage:
		Modifier: 0
		RequiresCondition: critical-damage
	# Note: No BurstWaitMultiplier at critical — firing is prevented by
	# TurretTurnSpeedMultiplier: 0 for turreted vehicles, and per-unit
	# AttackFrontal PauseOnCondition for turretless vehicles (e.g. giatsint).
	TurretTurnSpeedMultiplier@CriticalDamage:
		Modifier: 0
		RequiresCondition: critical-damage

# Crew-condition-driven vehicle disability — used by vehicles with VehicleCrew trait
# Replaces blanket SpeedMultiplier@CriticalDamage / TurretTurnSpeedMultiplier@CriticalDamage
# Use ^CrewedVehicle2 for Driver+Gunner, ^CrewedVehicle3 for Driver+Gunner+Commander
^CrewedVehicle2:
	# No driver = can't move
	SpeedMultiplier@NoDriver:
		Modifier: 0
		RequiresCondition: !has-driver
	# No gunner = turret frozen
	TurretTurnSpeedMultiplier@NoGunner:
		Modifier: 0
		RequiresCondition: !has-gunner
	# Death cookoff — punishes crew that didn't clear the husk cell in time.
	# Single-tile damage radius (0c512) so adjacent units take nothing.
	Explodes@CrewCookoff:
		Weapon: VehicleCookoff
		EmptyWeapon: VehicleCookoff
		Chance: 100

^CrewedVehicle3:
	# No driver AND no commander = can't move at all
	SpeedMultiplier@NoDriver:
		Modifier: 0
		RequiresCondition: !has-driver && !has-commander
	# Driver gone but commander present = crawl at 40% speed
	SpeedMultiplier@CommanderDrives:
		Modifier: 40
		RequiresCondition: !has-driver && has-commander
	# No gunner AND no commander = turret frozen
	TurretTurnSpeedMultiplier@NoGunner:
		Modifier: 0
		RequiresCondition: !has-gunner && !has-commander
	# Gunner gone but commander present = 50% turret speed
	TurretTurnSpeedMultiplier@CommanderGuns:
		Modifier: 50
		RequiresCondition: !has-gunner && has-commander
	# Commander gunning = worse accuracy
	InaccuracyMultiplier@CommanderGuns:
		Modifier: 200
		RequiresCondition: !has-gunner && has-commander
	# No commander = reduced accuracy (commander normally provides oversight)
	InaccuracyMultiplier@NoCommander:
		Modifier: 150
		RequiresCondition: !has-commander
	# Death cookoff — same rationale as ^CrewedVehicle2 above.
	Explodes@CrewCookoff:
		Weapon: VehicleCookoff
		EmptyWeapon: VehicleCookoff
		Chance: 100

^EffectsWhenMovingVehicles:
	InaccuracyMultiplier@Moving:
		RequiresCondition: moving
		Modifier: 150

# Vehicle suppression — crew is buttoned up, turret slows, accuracy degrades
# No speed reduction (armored vehicles keep moving), milder effects than infantry
^VehicleSuppressionEffects:
	ExternalCondition@VehicleSuppression:
		Condition: suppressed
		TotalCap: 50
		ReduceTicks: 3
		ReduceAmount: 1
	Inherits@VehSuppressionPips: ^SuppressionPips
	# Turret slows as crew buttons up (5 tiers, 50 cap)
	TurretTurnSpeedMultiplier@Suppression_1:
		RequiresCondition: suppressed > 0 && suppressed <= 10
		Modifier: 85
	TurretTurnSpeedMultiplier@Suppression_2:
		RequiresCondition: suppressed > 10 && suppressed <= 20
		Modifier: 70
	TurretTurnSpeedMultiplier@Suppression_3:
		RequiresCondition: suppressed > 20 && suppressed <= 30
		Modifier: 55
	TurretTurnSpeedMultiplier@Suppression_4:
		RequiresCondition: suppressed > 30 && suppressed <= 40
		Modifier: 40
	TurretTurnSpeedMultiplier@Suppression_5:
		RequiresCondition: suppressed > 40 && suppressed <= 50
		Modifier: 25
	# Accuracy degrades as crew is rattled
	InaccuracyMultiplier@Suppression_1:
		RequiresCondition: suppressed > 0 && suppressed <= 10
		Modifier: 115
	InaccuracyMultiplier@Suppression_2:
		RequiresCondition: suppressed > 10 && suppressed <= 20
		Modifier: 130
	InaccuracyMultiplier@Suppression_3:
		RequiresCondition: suppressed > 20 && suppressed <= 30
		Modifier: 150
	InaccuracyMultiplier@Suppression_4:
		RequiresCondition: suppressed > 30 && suppressed <= 40
		Modifier: 175
	InaccuracyMultiplier@Suppression_5:
		RequiresCondition: suppressed > 40 && suppressed <= 50
		Modifier: 200
	# Burst rate slows slightly
	BurstWaitMultiplier@Suppression_1:
		RequiresCondition: suppressed > 0 && suppressed <= 10
		Modifier: 105
	BurstWaitMultiplier@Suppression_2:
		RequiresCondition: suppressed > 10 && suppressed <= 20
		Modifier: 110
	BurstWaitMultiplier@Suppression_3:
		RequiresCondition: suppressed > 20 && suppressed <= 30
		Modifier: 120
	BurstWaitMultiplier@Suppression_4:
		RequiresCondition: suppressed > 30 && suppressed <= 40
		Modifier: 130
	BurstWaitMultiplier@Suppression_5:
		RequiresCondition: suppressed > 40 && suppressed <= 50
		Modifier: 150

