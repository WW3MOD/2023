
humvee:
	Inherits@Combatant: ^Combatant
	Inherits@Type: ^WheeledVehicle
	Inherits@Crew: ^CrewedVehicle2
	Inherits@CargoPips: ^CargoPips
	Inherits@EXPERIENCE: ^GainsExperience
	Inherits@AutoTarget: ^AutoTargetLMG
	VehicleCrew:
		CrewSlots: Driver, Gunner
		CrewActors:
			Driver: crew.driver.america
			Gunner: crew.gunner.america
		SlotConditions:
			Driver: has-driver
			Gunner: has-gunner
		EjectionOrder: Gunner, Driver
		EjectionDelay: 15
		EjectionDelayVariance: 5
		# Light unarmored — penetrating hits kill crew often.
		CrewDamageThresholdPercent: 20
		EjectionSurvivalRate: 70
	# Humvee = unarmored fuel fire on death, not a catastrophic ammo cookoff.
	Explodes@CrewCookoff:
		Weapon: VehicleCookoffTiny
		EmptyWeapon: VehicleCookoffTiny
	AutoTargetPriority@Default:
		RequiresCondition: !stance-fireatwill && !assault-move
	RenderSprites:
		Scale: 0.9
	Buildable:
		Queue: Vehicle
		BuildPaletteOrder: 1
		Prerequisites: ~player.america, ~vehicles.america, ~techlevel.medium
		Description: Fast wheeled transport with mounted gun.\n\n - 7.62mm machine gun\n - Carries 8 infantry\n - Armor: Light
	Valued:
		Cost: 450
	Tooltip:
		Name: Humvee
	AnnounceOnSeen:
		Type: Vehicle
		TextNotification: Spotted: Humvee
	ActorLostNotification:
		TextNotification: Lost: Humvee
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Health:
		HP: 8000
	Armor:
		Type: Light
		Thickness: 10
		Distribution: 100,80,80,80,60
	Targetable:
		TargetTypes: Ground, Vehicle, Light
	HitShape:
		Type: Rectangle
			VerticalTopOffset: 350
			TopLeft: -220, -500
			BottomRight: 220, 500
	Mobile:
		Locomotor: lightwheeled
		Speed: 150
		Acceleration: 3, 4, 5, 6, 5, 4, 3, 2, 1
		TurnSpeed: 15
		PauseOnCondition: empdisable
	Turreted:
		TurnSpeed: 20
		Offset: 32,0,80
	WithSpriteTurret@1:
	Armament@1:
		Name: primary
		Weapon: 7.62mm.MG
		MuzzleSequence: muzzle
		PauseOnCondition: !ammo-primary || empdisable || critical-damage
	AmmoPool@1:
		Name: primary-ammo
		Armaments: primary
		Ammo: 300
		AmmoCondition: ammo-primary
		RearmSound: minelay1.aud
		# 7.62mm MG ammo is bulk-cheap; CreditValue: 0 keeps full evac refund
		# (per-round deduction × 300 rounds would dwarf the 450 unit cost).
		SupplyValue: 1
		CreditValue: 0
	WithAmmoPipsDecoration@1:
		Position: Bottom
		Margin: 7, 3
		PipCount: 5
		RequiresSelection: true
		FullSequence: pip-yellow
		AmmoPools: primary-ammo
	RenderRangeCircle@1:
		Armament: primary
		RangeCircleType: bullet
		Color: FFFF00
		Width: 1
	# Turreted@WGM:
	# 	Turret: secondary
	# 	TurnSpeed: 8
	# 	Offset: -160,0,85
	# WithSpriteTurret@WGM:
	# 	Turret: secondary
	# 	Sequence: turret2
	# Armament@WGM:
	# 	Name: secondary
	# 	Weapon: WGM
	# 	Turret: secondary
	# 	FireDelay: 50
	# 	PauseOnCondition: !ammo-secondary || empdisable
	# AmmoPool@WGM:
	# 	Name: secondary-ammo
	# 	Armaments: secondary
	# 	Ammo: 3
	# 	AmmoCondition: ammo-secondary
	# 	RearmSound: minelay1.aud
	# WithAmmoPipsDecoration@WGM:
	# 	Position: Bottom
	# 	Margin: 3, 6
	# 	PipCount: 3
	# 	RequiresSelection: true
	# 	FullSequence: pip-green
	# 	AmmoPools: secondary-ammo
	# RenderRangeCircle@2:
	# 	Armament: secondary
	# 	Color: 00FF00
	# 	Width: 1
	# 	Alpha: 100
	# NextBurstBar@2:
	# 	Armaments: secondary
	# 	Color: 00FF00

	Rearmable:
		RearmActors: logisticscenter
		AmmoPools: primary-ammo #, secondary-ammo
	AttackTurreted:
		TargetFrozenActors: True
		Turrets: primary #, secondary
		PauseOnCondition: empdisable || unit.docked
	WithMuzzleOverlay:
	Cargo:
		Types: Infantry
		MaxWeight: 8
		AfterLoadDelay: 0
		BeforeUnloadDelay: 0
		AfterUnloadDelay: 0
		LoadingCondition: notmobile
		EjectOnDeath: True
	WithCargoPipsDecoration:
	# ThrowsShrapnel@Turret1:
	# 	Weapons: debris.humvee.turret
	# 	Pieces: 1, 1
	# 	Range: 1c0, 1c0
	# ThrowsShrapnel@Turret2:
	# 	Weapons: debris.rocket_buggy.turret
	# 	Pieces: 1, 1
	# 	Range: 1c0, 1c0
	# 	RequiresCondition: wgm_missile
	RenderSprites:
		Image: humvee
	SpawnActorOnDeath:
