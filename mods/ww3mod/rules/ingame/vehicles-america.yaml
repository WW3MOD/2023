
humvee:
	Inherits@Combatant: ^Combatant
	Inherits@Type: ^WheeledVehicle
	Inherits@Crew: ^CrewedVehicle2
	Inherits@CargoPips: ^CargoPips
	Inherits@EXPERIENCE: ^GainsExperience
	Inherits@AutoTarget: ^AutoTargetLMG
	VehicleCrew:
		CrewSlots: Driver, Gunner
		CrewActors:
			Driver: crew.driver.america
			Gunner: crew.gunner.america
		SlotConditions:
			Driver: has-driver
			Gunner: has-gunner
		EjectionOrder: Gunner, Driver
		EjectionDelay: 15
		EjectionDelayVariance: 5
	-SpeedMultiplier@CriticalDamage:
	-TurretTurnSpeedMultiplier@CriticalDamage:
	AutoTargetPriority@Default:
		RequiresCondition: !stance-fireatwill && !assault-move
	RenderSprites:
		Scale: 0.9
	Buildable:
		Queue: Vehicle
		BuildPaletteOrder: 1
		Prerequisites: ~player.america, ~vehicles.america, ~techlevel.medium
		Description: Fast wheeled transport with mounted gun.\n\n - 7.62mm machine gun\n - Carries 8 infantry\n - Armor: Light
	Valued:
		Cost: 600
	Tooltip:
		Name: Humvee
	AnnounceOnSeen:
		Type: Vehicle
		TextNotification: Spotted: Humvee
	ActorLostNotification:
		TextNotification: Lost: Humvee
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Health:
		HP: 8000
	Armor:
		Type: Light
		Thickness: 10
		Distribution: 100,80,80,80,60
	Targetable:
		TargetTypes: Ground, Vehicle, Light
	HitShape:
		Type: Rectangle
			VerticalTopOffset: 350
			TopLeft: -220, -500
			BottomRight: 220, 500
	Mobile:
		Locomotor: lightwheeled
		Speed: 130
		Acceleration: 3, 4, 5, 6, 5, 4, 3, 2, 1
		TurnSpeed: 15
		PauseOnCondition: empdisable
	Turreted:
		TurnSpeed: 20
		Offset: 32,0,80
	WithSpriteTurret@1:
	Armament@1:
		Name: primary
		Weapon: 7.62mm.MG
		MuzzleSequence: muzzle
		PauseOnCondition: !ammo-primary || empdisable
	AmmoPool@1:
		Name: primary-ammo
		Armaments: primary
		Ammo: 300
		AmmoCondition: ammo-primary
		FullReloadTicks: 300
		FullReloadSteps: 6
		RearmSound: minelay1.aud
	WithAmmoPipsDecoration@1:
		Position: Bottom
		Margin: 7, 3
		PipCount: 5
		RequiresSelection: true
		FullSequence: pip-yellow
		AmmoPools: primary-ammo
	RenderRangeCircle@1:
		Armament: primary
		Color: FFFF00
		Width: 1
		Alpha: 100
