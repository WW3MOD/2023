
HALO:
	Inherits@Type: ^Helicopter
	Inherits@CargoPips: ^CargoPips
	HeliEmergencyLanding:
		SpinsOnCrash: false
	Buildable:
		Queue: Aircraft
		BuildAtProductionType: Helicopter
		BuildPaletteOrder: 1
		Prerequisites: ~player.russia, ~aircraft.russia, ~techlevel.medium
		Description: Heavy transport helicopter.\n\n - Carries infantry\n - Unarmed\n - Armor: Light
	Valued:
		Cost: 2000
	Tooltip:
		Name: Halo
	RenderSprites:
		Image: halo
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Health:
		HP: 600
	Armor:
		Type: Light
		Thickness: 6
	Targetable@Armor:
		TargetTypes: Light
	Aircraft:
		TurnSpeed: 8
		Speed: 240
		AltitudeVelocity: 0c58
	Cargo:
		Types: Infantry
		MaxWeight: 24
		AfterUnloadDelay: 40
	WithCargoPipsDecoration:
		PipCount: 24
	Selectable:
		DecorationBounds: 1700,1536
	WithIdleOverlay@Rotor1Air:
		Offset: 260,0,343
		Sequence: rotor
	WithIdleOverlay@Rotor1Ground:
		Offset: 260,0,343
		Sequence: slow-rotor
	SpawnActorOnDeath@Hovering:
		Actor: HALO.Husk
		RequiresCondition: airborne && !moving && !empdisable
	SpawnActorOnDeath@EMP:
		Actor: HALO.Husk.EMP
		RequiresCondition: airborne && !moving && empdisable
	SpawnActorOnDeath@Moving:
		Actor: HALO.Husk.moving
		RequiresCondition: airborne && moving && !empdisable
	SpawnActorOnDeath@EMPmoving:
		Actor: HALO.Husk.moving
		RequiresCondition: airborne && moving && !empdisable
	SpawnActorOnDeath@Ground:
		Actor: HALO.Husk.ground
		RequiresCondition: !airborne
	# GrantConditionOnAttack:
	# 	Condition: dropcargo
	# ParachuteCargoOnCondition:
	# 	RequiresCondition: dropcargo

HIND:
	Inherits@Type: ^Helicopter
	# Inherits@AutoTarget: ^AutoTargetGroundAntiTankandAir
	Inherits@CargoPips: ^CargoPips
	AutoTarget:
		InitialStance: FireAtWill
		InitialStanceAI: FireAtWill
	AutoTargetPriority@Default:
		ValidTargets: Air, Vehicle, Water
		Priority: 3
	AutoTargetPriority@Lower:
		ValidTargets: Infantry, Defense, Mine, Underwater
		Priority: 2
	AutoTargetPriority@FireAtWill:
		RequiresCondition: stance-fireatwill
		Priority: 1
		ValidTargets: Infantry, Vehicle, Water, Underwater, Air, Structure, Defense, Mine
	Buildable:
		Queue: Aircraft
		BuildAtProductionType: Helicopter
		BuildPaletteOrder: 2
		Prerequisites: ~player.russia, ~aircraft.russia, ~techlevel.high
		Description: Armored gunship with chainguns and rockets.\n\n - Dual chainguns\n - Anti-ground rockets\n - Slow but durable\n - Armor: Medium
	Tooltip:
		Name: Mi-24 Hind
	Valued:
		Cost: 4000
	UpdatesPlayerStatistics:
		AddToArmyValue: true
	Selectable:
		DecorationBounds: 1620,1360
	Health:
		HP: 800
	Armor:
		Type: Heavy
		Thickness: 10
	Targetable@Armor:
		TargetTypes: Heavy
	Aircraft:
		TurnSpeed: 10
		Speed: 195
		InitialFacing: 192
	AttackAircraft:
		Armaments: primary, secondary #, secondary-air
		FacingTolerance: 60
		AttackType: Hover
		ForceFireIgnoresActors: True
		OpportunityFire: True
		PersistentTargeting: false
	Armament@1:
		Name: primary
		Weapon: 12.7mm.Hind
		LocalOffset: 85,0,-85
		MuzzleSequence: muzzle
		PauseOnCondition: !ammo-primary
	WithMuzzleOverlay:
	AmmoPool@1:
		Name: primary-ammo
		Armaments: primary
		Ammo: 150
		ReloadDelay: 6
		AmmoCondition: ammo-primary
	ReloadAmmoPool@1:
		AmmoPool: primary-ammo
		FullReloadTicks: 400
		FullReloadSteps: 8
		Sound: minelay1.aud
		RequiresCondition: unit.docked && !airborne
	WithAmmoPipsDecoration@1:
		AmmoPools: primary-ammo
		Position: Bottom
		Margin: 13, 6
		PipCount: 8
		FullSequence: pip-yellow
		RequiresSelection: true
	RenderRangeCircle@1:
		Armament: primary
		Width: 2
		Color: FFFF00
	Armament@2:
		Name: secondary
		Weapon: RocketPods
		LocalOffset: 0,-640,0, 0,640,0
		LocalYaw: -40, 24
		PauseOnCondition: !ammo-secondary
	AmmoPool@2:
		Name: secondary-ammo
		Armaments: secondary
		Ammo: 80
		ReloadDelay: 16
		AmmoCondition: ammo-secondary
	ReloadAmmoPool@2:
		AmmoPool: secondary-ammo
		FullReloadTicks: 400
		FullReloadSteps: 8
		Sound: minelay1.aud
		RequiresCondition: unit.docked && !airborne
	WithAmmoPipsDecoration@2:
		AmmoPools: secondary-ammo
		Position: Bottom
		Margin: 13, 3
		PipCount: 8
		FullSequence: pip-red
		RequiresSelection: true
	RenderRangeCircle@2:
		Armament: secondary
		Width: 3
		Color: FF0000
	Rearmable:
		RearmActors: hpad
		AmmoPools: primary-ammo, secondary-ammo
	EjectOnDeath@Copilot:
		PilotActor: E1R1
		SuccessRate: 80
		EjectOnGround: true
		AllowUnsuitableCell: false
		RequiresCondition: !suppress-eject
	WithIdleOverlay@ROTORAIR:
		Sequence: rotor
		RequiresCondition: airborne
	WithIdleOverlay@ROTORGROUND:
		Sequence: slow-rotor
		RequiresCondition: !airborne
	# SmokeTrailWhenDamaged:
	# 	Offset: -427,0,0
	SpawnActorOnDeath@Hovering:
		Actor: HIND.Husk
		RequiresCondition: airborne && !moving && !empdisable
	SpawnActorOnDeath@EMP:
		Actor: HIND.Husk.EMP
		RequiresCondition: airborne && !moving && empdisable
	SpawnActorOnDeath@Moving:
		Actor: HIND.Husk.moving
		RequiresCondition: airborne && moving && !empdisable
	SpawnActorOnDeath@EMPmoving:
		Actor: HIND.Husk.moving
		RequiresCondition: airborne && moving && !empdisable
	SpawnActorOnDeath@Ground:
		Actor: HIND.Husk.ground
		RequiresCondition: !airborne
	Cargo:
		Types: Infantry
		MaxWeight: 8
		AfterUnloadDelay: 40
	WithCargoPipsDecoration:
	RenderSprites:
		Scale: 1.3

