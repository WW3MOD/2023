^AmmoDecoration:
	ExternalCondition@WeaponPrimary:
		Condition: weapon-primary
	ExternalCondition@WeaponSecondary:
		Condition: weapon-secondary
	ExternalCondition@WeaponTertiary:
		Condition: weapon-tertiary
	ExternalCondition@AmmoPrimary:
		Condition: ammo-primary
	ExternalCondition@AmmoSecondary:
		Condition: ammo-secondary
	ExternalCondition@AmmoTertiary:
		Condition: ammo-tertiary
	WithDecoration@AmmoNone:
		RequiresSelection: false
		Image: pips
		Sequence: pip-ammo-none
		Position: Bottom
		Margin: 0,-5
		RequiresCondition: (weapon-primary || weapon-secondary) && !(weapon-primary && ammo-primary) && !(weapon-secondary && ammo-secondary) && !(weapon-tertiary && ammo-tertiary)
		BlinkInterval: 8
		BlinkPattern: Off, On
	WithDecoration@AmmoPrimaryNone:
		RequiresSelection: false
		Image: pips
		Sequence: pip-ammo-primary-none
		Position: Bottom
		Margin: 0,-5
		RequiresCondition: weapon-primary && weapon-secondary && !ammo-primary && ammo-secondary && !(weapon-tertiary && !ammo-tertiary)
		BlinkInterval: 16
		BlinkPattern: Off, On
	WithDecoration@AmmoSecondaryNone:
		RequiresSelection: false
		Image: pips
		Sequence: pip-ammo-secondary-none
		Position: Bottom
		Margin: 0,-5
		RequiresCondition: ((weapon-secondary && !ammo-secondary) || (weapon-tertiary && !ammo-tertiary)) && !(weapon-primary && !ammo-primary)
		BlinkInterval: 16
		BlinkPattern: On, Off
