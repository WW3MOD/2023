^DamageVehiclePips:
	WithDecoration@DamageVehiclePips_Light:
		Image: pips
		Sequence: pip-damage-vehicle-light
		Position: Top
		Margin: 0,0
		RequiresCondition: light-damage
	WithDecoration@DamageVehiclePips_Medium:
		Image: pips
		Sequence: pip-damage-vehicle-medium
		Position: Top
		Margin: 0,0
		RequiresCondition: medium-damage
	WithDecoration@DamageVehiclePips_Heavy:
		Image: pips
		Sequence: pip-damage-vehicle-heavy
		Position: Top
		Margin: 0,0
		RequiresCondition: heavy-damage
	WithDecoration@DamageVehiclePips_Critical:
		Image: pips
		Sequence: pip-damage-vehicle-critical
		Position: Top
		Margin: 0,0
		RequiresCondition: critical-damage

# Garrison-specific health pips: same vehicle pip sequences but no critical
# blinking, since buildings can't be destroyed (no rubble transition yet).
# Heavy pip covers both heavy-damage AND critical-damage so the red indicator
# stays visible all the way to the building's lowest protection state.
^GarrisonHealthPips:
	WithDecoration@GarrisonHealth_Light:
		Image: pips
		Sequence: pip-damage-vehicle-light
		Position: Top
		Margin: 0,0
		RequiresCondition: light-damage
	WithDecoration@GarrisonHealth_Medium:
		Image: pips
		Sequence: pip-damage-vehicle-medium
		Position: Top
		Margin: 0,0
		RequiresCondition: medium-damage
	WithDecoration@GarrisonHealth_Heavy:
		Image: pips
		Sequence: pip-damage-vehicle-heavy
		Position: Top
		Margin: 0,0
		RequiresCondition: heavy-damage || critical-damage

