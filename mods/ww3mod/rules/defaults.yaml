^DamageStates:
	GrantConditionOnDamageState@Damaged:
		Condition: damaged
		ValidDamageStates: Light, Medium, Heavy, Critical
	GrantConditionOnDamageState@LightDamage:
		Condition: light-damage
		ValidDamageStates: Light
	GrantConditionOnDamageState@LightDamageAttained:
		Condition: light-damage-attained
		ValidDamageStates: Light, Medium, Heavy, Critical
	GrantConditionOnDamageState@MediumDamage:
		Condition: medium-damage
		ValidDamageStates: Medium
	GrantConditionOnDamageState@MediumDamageAttained:
		Condition: medium-damage-attained
		ValidDamageStates: Medium, Heavy, Critical
	GrantConditionOnDamageState@HeavyDamage:
		Condition: heavy-damage
		ValidDamageStates: Heavy
	GrantConditionOnDamageState@HeavyDamageAttained:
		Condition: heavy-damage-attained
		ValidDamageStates: Heavy, Critical
	GrantConditionOnDamageState@CriticalDamage:
		Condition: critical-damage
		ValidDamageStates: Critical

