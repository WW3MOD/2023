		SkipRearmBuildingCheck: true
		UnitQueues: Aircraft
		UnitsToBuild:
			HIND: 80
			MI28: 50
			HALO: 15
		UnitLimits:
			HIND: 4
			MI28: 3
			HALO: 2
		UnitDelays:
			HIND: 2500
			MI28: 3500
			HALO: 2500

