Player:
	# ===== Bot Types =====
	ModularBot@normal:
		Name: Normal AI
		Type: normal
	ModularBot@rush:
		Name: Rush AI
		Type: rush
	ModularBot@turtle:
		Name: Turtle AI
		Type: turtle

	GrantConditionOnBotOwner@normal:
		Condition: enable-ai-player
		Bots: normal
	GrantConditionOnBotOwner@rush:
		Condition: enable-ai-rush
		Bots: rush
	GrantConditionOnBotOwner@turtle:
		Condition: enable-ai-turtle
		Bots: turtle

	# Unified condition for any AI type (used by shared modules)
	GrantConditionOnBotOwner@anyai:
		Condition: enable-ai-any
		Bots: normal, rush, turtle

	ProvidesPrerequisite@AIRESTRICTOR:
		Prerequisite: aitoodumb
		RequiresCondition: enable-ai-any
	GrantConditionOnPrerequisite@NAVYDISABLER:
		Condition: global-disablenavy
		Prerequisites: global-disablenavy

	# ===== Shared Modules (all AI types) =====

	CaptureManagerBotModule@tecn:
		RequiresCondition: enable-ai-any
		CapturingActorTypes: tecn,tecn.russia,tecn.america
		CapturableActorTypes: oilb,bio,miss,fcom,hosp
		CheckCaptureTargetsForVisibility: false
		MaximumCaptureTargetOptions: 15

	CaptureManagerBotModule@engineer:
		RequiresCondition: enable-ai-any
		CapturingActorTypes: e6,e6.russia,e6.america
		CapturableActorTypes: oilb,bio,miss,fcom,hosp
		CheckCaptureTargetsForVisibility: false
		MaximumCaptureTargetOptions: 15

	BuildingRepairBotModule@aiplayer:
		RequiresCondition: enable-ai-any

	# AI deploys LCCVs into logistics centers near base
	McvManagerBotModule@lccv:
		RequiresCondition: enable-ai-any
		McvTypes: lccv
		ConstructionYardTypes: logisticscenter
		McvFactoryTypes: supplyroute
		MinimumConstructionYardCount: 1
		ScanForNewMcvInterval: 50
		MinBaseRadius: 3
		MaxBaseRadius: 15
		RestrictMCVDeploymentFallbackToBase: true

	# Capture enemy logistics centers to deny resupply
	CaptureManagerBotModule@captureenemystructures:
		RequiresCondition: enable-ai-any
		CapturingActorTypes: tecn,tecn.russia,tecn.america
		CapturableActorTypes: logisticscenter
		CheckCaptureTargetsForVisibility: true
		MaximumCaptureTargetOptions: 10

	# ===== Base Builder — Normal =====
	BaseBuilderBotModule@normal:
		RequiresCondition: enable-ai-player
		ConstructionYardTypes: supplyroute
		VehiclesFactoryTypes: supplyroute
		BarracksTypes: supplyroute
		HeliTypes: hpad
		AirfieldTypes: afld
		ProductionTypes: supplyroute, hpad, afld
		DefenseTypes: gtwr, pbox, hbox, agun, sam, hsam
		BuildingQueues: Building
		DefenseQueues: Defense
		MinBaseRadius: 2
		MaxBaseRadius: 20
		PlaceDefenseTowardsEnemyChance: 80
		MinimumDefenseRadius: 5
		MaximumDefenseRadius: 15
		NewProductionCashThreshold: 5000
		RallyPointScanRadius: 10
		BuildingLimits:
			logisticscenter: 2
			hpad: 3
			afld: 2
		BuildingFractions:
			logisticscenter: 20
			hpad: 5
			afld: 5
			gtwr: 8
			pbox: 5
			hbox: 3
			agun: 4
			sam: 2
			hsam: 2

	# ===== Base Builder — Rush (minimal defenses, fast logistics) =====
	BaseBuilderBotModule@rush:
		RequiresCondition: enable-ai-rush
		ConstructionYardTypes: supplyroute
		VehiclesFactoryTypes: supplyroute
		BarracksTypes: supplyroute
		HeliTypes: hpad
		AirfieldTypes: afld
		ProductionTypes: supplyroute, hpad, afld
		DefenseTypes: gtwr, pbox, agun
		BuildingQueues: Building
		DefenseQueues: Defense
		MinBaseRadius: 2
		MaxBaseRadius: 20
		PlaceDefenseTowardsEnemyChance: 60
		MinimumDefenseRadius: 3
		MaximumDefenseRadius: 10
		NewProductionCashThreshold: 3000
		RallyPointScanRadius: 10
		BuildingLimits:
			logisticscenter: 1
			hpad: 2
			afld: 1
		BuildingFractions:
			logisticscenter: 15
			hpad: 3
			afld: 3
			gtwr: 4
			pbox: 2
			agun: 2

	# ===== Base Builder — Turtle (heavy defenses, full infrastructure) =====
	BaseBuilderBotModule@turtle:
		RequiresCondition: enable-ai-turtle
		ConstructionYardTypes: supplyroute
		VehiclesFactoryTypes: supplyroute
		BarracksTypes: supplyroute
		HeliTypes: hpad
		AirfieldTypes: afld
		ProductionTypes: supplyroute, hpad, afld
		DefenseTypes: gtwr, pbox, hbox, agun, sam, hsam
		BuildingQueues: Building
		DefenseQueues: Defense
		MinBaseRadius: 2
		MaxBaseRadius: 20
		PlaceDefenseTowardsEnemyChance: 100
		MinimumDefenseRadius: 5
		MaximumDefenseRadius: 20
		NewProductionCashThreshold: 8000
		RallyPointScanRadius: 10
		BuildingLimits:
			logisticscenter: 3
			hpad: 4
			afld: 3
		BuildingFractions:
			logisticscenter: 25
			hpad: 6
			afld: 6
			gtwr: 12
			pbox: 8
			hbox: 5
			agun: 6
			sam: 4
			hsam: 3

	# ===== Aircraft — Russia =====
	UnitBuilderBotModule@russia.air:
		RequiresCondition: enable-ai-any && player.brics
		IdleBaseUnitsMaximum: 0
		UnitQueues: Aircraft
		UnitsToBuild:
			HIND: 100
			MI28: 60
			MIG: 30
		UnitLimits:
			HIND: 4
			MI28: 3
			MIG: 2

	SquadManagerBotModule@russia.air:
		RequiresCondition: enable-ai-any && player.brics
		SquadSize: 2
		SquadSizeRandomBonus: 2
		RushInterval: 600
		AttackScanRadius: 48
		IgnoredEnemyTargetTypes: Submarine, IgnoreThis

	# ===== Aircraft — America =====
	UnitBuilderBotModule@america.air:
		RequiresCondition: enable-ai-any && player.nato
		IdleBaseUnitsMaximum: 0
		UnitQueues: Aircraft
		UnitsToBuild:
			HELI: 100
			A10: 40
			F16: 30
		UnitLimits:
			HELI: 4
			A10: 2
			F16: 2

	SquadManagerBotModule@america.air:
		RequiresCondition: enable-ai-any && player.nato
		SquadSize: 2
		SquadSizeRandomBonus: 2
		RushInterval: 600
		AttackScanRadius: 48
		IgnoredEnemyTargetTypes: Submarine, IgnoreThis
