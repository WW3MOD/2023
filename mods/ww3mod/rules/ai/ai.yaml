Player:
	# ===== Bot Types =====
	#
	# Condition map — when adding a new bot type or wiring a new module,
	# pick the right condition:
	#
	#   enable-ai-any           granted to: normal, rush, turtle, v2
	#                           use for:    truly universal modules (intel, repair, scout)
	#
	#   enable-ai-player        granted to: normal, v2
	#                           use for:    the "normal baseline" — modules that the
	#                                       default Normal AI uses and that v2 inherits
	#                                       as its starting point. Misleadingly named:
	#                                       it does NOT mean "any AI player". Kept for
	#                                       backwards compatibility with existing wiring.
	#                           PITFALL: this is not a synonym for "any AI". Rush and
	#                                    turtle do NOT get this condition.
	#
	#   enable-ai-rush          granted to: rush
	#   enable-ai-turtle        granted to: turtle
	#   enable-ai-v2            granted to: v2     — use for NEW v2-only modules
	#   enable-ai-legacy-only   granted to: normal, rush, turtle (everyone except v2)
	#                           use for:    modules that v2 replaces — keep the legacy
	#                                       module around for tournament baselines.
	#
	# Tournament harness uses these conditions to A/B test v2 against the legacy
	# Normal AI without rebuilding the binary. See:
	#   WORKSPACE/plans/260511_ai_tournament_harness.md
	#   WORKSPACE/ai/tournament_swap_guide.md
	ModularBot@normal:
		Name: Normal AI
		Type: normal
	ModularBot@rush:
		Name: Rush AI
		Type: rush
	ModularBot@turtle:
		Name: Turtle AI
		Type: turtle
	ModularBot@v2:
		Name: V2 AI (experimental)
		Type: v2

	# Bots list expanded to include v2 so v2 inherits the normal-tier modules
	# as its baseline. New v2-only modules use `enable-ai-v2` instead.
	GrantConditionOnBotOwner@normal:
		Condition: enable-ai-player
		Bots: normal, v2
	GrantConditionOnBotOwner@rush:
		Condition: enable-ai-rush
		Bots: rush
	GrantConditionOnBotOwner@turtle:
		Condition: enable-ai-turtle
		Bots: turtle
	GrantConditionOnBotOwner@v2:
		Condition: enable-ai-v2
		Bots: v2

	# Unified condition for any AI type (used by shared modules)
	GrantConditionOnBotOwner@anyai:
		Condition: enable-ai-any
		Bots: normal, rush, turtle, v2

	# Inverse of @v2 — "any legacy AI but not v2". Reserved for future use when
	# v2 replaces a module: the old module moves to enable-ai-legacy-only, the
	# new v2 module gets enable-ai-v2. Currently unused — every existing module
	# is shared between normal-tier and v2 baseline.
	GrantConditionOnBotOwner@legacyonly:
		Condition: enable-ai-legacy-only
		Bots: normal, rush, turtle

	# Shared blackboard for inter-module coordination
	BotBlackboard@ai:
		RequiresCondition: enable-ai-any
		TaskStaleTicks: 1500
		CleanupInterval: 300

	ProvidesPrerequisite@AIRESTRICTOR:
		Prerequisite: aitoodumb
		RequiresCondition: enable-ai-any
	GrantConditionOnPrerequisite@NAVYDISABLER:
		Condition: global-disablenavy
		Prerequisites: global-disablenavy

	# ===== Shared Modules (all AI types) =====

	CaptureManagerBotModule@tecn:
		RequiresCondition: enable-ai-any
		CapturingActorTypes: tecn,tecn.russia,tecn.america
		CapturableActorTypes: oilb,bio,miss,fcom,hosp
		CheckCaptureTargetsForVisibility: false
		MaximumCaptureTargetOptions: 15

	CaptureManagerBotModule@engineer:
		RequiresCondition: enable-ai-any
		CapturingActorTypes: e6,e6.russia,e6.america
		CapturableActorTypes: oilb,bio,miss,fcom,hosp
		CheckCaptureTargetsForVisibility: false
		MaximumCaptureTargetOptions: 15

	BuildingRepairBotModule@aiplayer:
		RequiresCondition: enable-ai-any

	# TODO: LCCV deployment needs custom strategic logic (evaluate need, find safe location, escort)
	# Disabled until we have proper decision-making infrastructure for it.

	# Scouting — sends fast units to explore the map and report enemy positions
	ScoutBotModule@america:
		RequiresCondition: enable-ai-any && player.nato
		ScoutTypes: humvee
		MaxScouts: 2
		ScanInterval: 200
		MinScoutDistance: 15
		ScoutVisionRadius: 8

	ScoutBotModule@russia:
		RequiresCondition: enable-ai-any && player.brics
		ScoutTypes: btr
		MaxScouts: 2
		ScanInterval: 200
		MinScoutDistance: 15
		ScoutVisionRadius: 8

	# Garrison defense structures with infantry for base defense
	GarrisonBotModule@defenses:
		RequiresCondition: enable-ai-any
		ScanInterval: 200
		MaxGarrisonRadius: 25
		MaxOrdersPerTick: 2
		PrioritizeExposed: true

	# Supply trucks follow the army to resupply in the field
	SupplyFollowerBotModule@supply:
		RequiresCondition: enable-ai-any
		SupplyTruckTypes: truk
		ScanInterval: 150
		SafeFollowDistance: 5
		MaxFollowDistance: 35
		MinNearbyFriendlies: 4

	# Adaptive production — counter enemy composition
	AdaptiveProductionBotModule@america:
		RequiresCondition: enable-ai-any && player.nato
		EvaluationInterval: 600
		MaxRequestsPerCycle: 2
		AntiVehicleUnits: at.america, abrams, bradley
		AntiInfantryUnits: e3.america, ar.america, humvee
		AntiAirUnits: aa.america, strykershorad
		MinEnemySightings: 3

	AdaptiveProductionBotModule@russia:
		RequiresCondition: enable-ai-any && player.brics
		EvaluationInterval: 600
		MaxRequestsPerCycle: 2
		AntiVehicleUnits: at.russia, t90, bmp2
		AntiInfantryUnits: e3.russia, ar.russia, btr
		AntiAirUnits: aa.russia, tunguska
		MinEnemySightings: 3

	# Capture enemy logistics centers to deny resupply
	CaptureManagerBotModule@captureenemystructures:
		RequiresCondition: enable-ai-any
		CapturingActorTypes: tecn,tecn.russia,tecn.america
		CapturableActorTypes: logisticscenter
		CheckCaptureTargetsForVisibility: true
		MaximumCaptureTargetOptions: 10

	# ===== Base Builder — Normal =====
	BaseBuilderBotModule@normal:
		RequiresCondition: enable-ai-player
		ConstructionYardTypes: supplyroute
		VehiclesFactoryTypes: supplyroute
		BarracksTypes: supplyroute
		HeliTypes: hpad
		AirfieldTypes: afld
		ProductionTypes: supplyroute, hpad, afld
		DefenseTypes: gtwr, pbox, hbox, agun, sam, hsam
		BuildingQueues: Building
		DefenseQueues: Defense
		MinBaseRadius: 2
		MaxBaseRadius: 20
		PlaceDefenseTowardsEnemyChance: 80
		MinimumDefenseRadius: 5
		MaximumDefenseRadius: 15
		NewProductionCashThreshold: 5000
		RallyPointScanRadius: 10
		BuildingLimits:
			hpad: 3
			afld: 2
		BuildingFractions:
			hpad: 8
			afld: 5
			gtwr: 8
			pbox: 5
			hbox: 3
			agun: 4
			sam: 2
			hsam: 2

	# ===== Base Builder — Rush (minimal defenses, fast logistics) =====
	BaseBuilderBotModule@rush:
		RequiresCondition: enable-ai-rush
		ConstructionYardTypes: supplyroute
		VehiclesFactoryTypes: supplyroute
		BarracksTypes: supplyroute
		HeliTypes: hpad
		AirfieldTypes: afld
		ProductionTypes: supplyroute, hpad, afld
		DefenseTypes: gtwr, pbox, agun
		BuildingQueues: Building
		DefenseQueues: Defense
		MinBaseRadius: 2
		MaxBaseRadius: 20
		PlaceDefenseTowardsEnemyChance: 60
		MinimumDefenseRadius: 3
		MaximumDefenseRadius: 10
		NewProductionCashThreshold: 3000
		RallyPointScanRadius: 10
		BuildingLimits:
			hpad: 2
			afld: 1
		BuildingFractions:
			hpad: 4
			afld: 3
			gtwr: 4
			pbox: 2
			agun: 2

	# ===== Base Builder — Turtle (heavy defenses, full infrastructure) =====
	BaseBuilderBotModule@turtle:
		RequiresCondition: enable-ai-turtle
		ConstructionYardTypes: supplyroute
		VehiclesFactoryTypes: supplyroute
		BarracksTypes: supplyroute
		HeliTypes: hpad
		AirfieldTypes: afld
		ProductionTypes: supplyroute, hpad, afld
		DefenseTypes: gtwr, pbox, hbox, agun, sam, hsam
		BuildingQueues: Building
		DefenseQueues: Defense
		MinBaseRadius: 2
		MaxBaseRadius: 20
		PlaceDefenseTowardsEnemyChance: 100
		MinimumDefenseRadius: 5
		MaximumDefenseRadius: 20
		NewProductionCashThreshold: 8000
		RallyPointScanRadius: 10
		BuildingLimits:
			hpad: 4
			afld: 3
		BuildingFractions:
			hpad: 8
			afld: 6
			gtwr: 12
			pbox: 8
			hbox: 5
			agun: 6
			sam: 4
			hsam: 3

	# ===== Fixed-Wing Aircraft — Russia =====
	# Fixed-wing called in via Supply Route — no AFLD needed to produce them
	UnitBuilderBotModule@russia.fixedwing:
		RequiresCondition: enable-ai-any && player.brics
		IdleBaseUnitsMaximum: 0
		SkipRearmBuildingCheck: true
		UnitQueues: Aircraft
		UnitsToBuild:
			MIG: 30
			FROG: 20
		UnitLimits:
			MIG: 2
			FROG: 2

	SquadManagerBotModule@russia.fixedwing:
		RequiresCondition: enable-ai-any && player.brics
		SquadSize: 2
		SquadSizeRandomBonus: 1
		RushInterval: 600
		AttackScanRadius: 48
		AirUnitsTypes: MIG, FROG
		IgnoredEnemyTargetTypes: Submarine, IgnoreThis

	# ===== Helicopters — Russia =====
	# Helicopters are called in via Supply Route — no HPAD needed to produce them
	UnitBuilderBotModule@russia.heli:
		RequiresCondition: enable-ai-any && player.brics
