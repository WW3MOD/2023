Player:
	UnitBuilderBotModule@russia:
		RequiresCondition: enable-ai-player && player.brics
		UnitQueues: Vehicle, Infantry
		UnitDelays:
			lccv: 1500
		UnitsToBuild:
			# Conscripts -- low priority, mainly for capturing
			tecn.russia: 500

			# Core infantry -- high priority mix
			e3.russia: 120
			ar.russia: 100
			tl.russia: 80
			e2.russia: 60

			# Support infantry
			at.russia: 50
			mt.russia: 40
			medi.russia: 40
			aa.russia: 30
			sn.russia: 25
			e6.russia: 20

			# Vehicles -- balanced force composition
			btr: 30
			bmp2: 25
			t90: 20
			giatsint: 15
			tunguska: 10
			grad: 10

			# Logistics -- supply trucks and LCCV for field logistics center
			truk: 20
			lccv: 10

		UnitLimits:
			truk: 4
			lccv: 2
			tecn.russia: 3
			e6.russia: 2
			giatsint: 3
			grad: 2
			tunguska: 2
			sn.russia: 3

	SquadManagerBotModule@russia.land:
		RequiresCondition: enable-ai-player && player.brics
		SquadSize: 6
		SquadSizeRandomBonus: 14
		RushInterval: 150
		AttackScanRadius: 32
		DangerScanRadius: 25
		ExcludeFromSquadsTypes: tecn.russia, e6.russia, truk, lccv, medi.russia
		IgnoredEnemyTargetTypes: IgnoreThis

