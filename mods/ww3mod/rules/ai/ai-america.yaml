Player:
	UnitBuilderBotModule@america:
		RequiresCondition: enable-ai-player && player.nato
		UnitQueues: Vehicle, Infantry
		UnitDelays:
			lccv.ai: 1000
		UnitsToBuild:
			# Conscripts -- low priority, mainly for capturing
			tecn.america: 500

			# Core infantry -- high priority mix
			e3.america: 120
			ar.america: 100
			tl.america: 80
			e2.america: 60

			# Support infantry
			at.america: 50
			mt.america: 40
			medi.america: 40
			aa.america: 30
			sn.america: 25
			e6.america: 20

			# Vehicles -- balanced force composition
			humvee: 30
			bradley: 25
			abrams: 20
			m113: 15
			m109: 15
			strykershorad: 10

			# Supply trucks for resupply
			truk: 15

		UnitLimits:
			truk: 3
			tecn.america: 3
			e6.america: 2
			m109: 3
			strykershorad: 2
			sn.america: 3

	SquadManagerBotModule@america.land:
		RequiresCondition: enable-ai-player && player.nato
		SquadSize: 6
		SquadSizeRandomBonus: 14
		RushInterval: 150
		AttackScanRadius: 32
		DangerScanRadius: 25
		ExcludeFromSquadsTypes: tecn.america, e6.america
		IgnoredEnemyTargetTypes: IgnoreThis
