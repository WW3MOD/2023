Player:
	# ===== Normal AI — America (balanced, steady pressure) =====
	UnitBuilderBotModule@america.normal:
		RequiresCondition: enable-ai-player && player.nato
		UnitQueues: Vehicle, Infantry
		UnitsToBuild:
			# Conscripts -- low priority, mainly for capturing
			tecn.america: 500

			# Core infantry -- high priority mix
			e3.america: 120
			ar.america: 100
			tl.america: 80
			e2.america: 60

			# Support infantry
			at.america: 50
			mt.america: 40
			medi.america: 40
			aa.america: 30
			sn.america: 25
			e6.america: 20

			# Vehicles -- balanced force composition
			humvee: 30
			bradley: 25
			abrams: 20
			m113: 15
			m109: 15
			strykershorad: 10

			# Supply trucks for field resupply
			truk: 20

		UnitLimits:
			truk: 4
			tecn.america: 3
			e6.america: 2
			m109: 3
			strykershorad: 2
			sn.america: 3

	SquadManagerBotModule@america.normal:
		RequiresCondition: enable-ai-player && player.nato
		SquadSize: 6
		SquadSizeRandomBonus: 14
		RushInterval: 150
		AttackScanRadius: 32
		DangerScanRadius: 25
		ExcludeFromSquadsTypes: tecn.america, e6.america, truk, medi.america
		IgnoredEnemyTargetTypes: IgnoreThis

	# ===== Rush AI — America (fast, aggressive, smaller squads) =====
	UnitBuilderBotModule@america.rush:
		RequiresCondition: enable-ai-rush && player.nato
		UnitQueues: Vehicle, Infantry
		UnitsToBuild:
			# Heavy infantry focus for early aggression
			e3.america: 150
			ar.america: 120
			tl.america: 80
			e2.america: 70

			# Minimal support
			at.america: 40
			mt.america: 30
			medi.america: 20

			# Fast vehicles for early strikes
			humvee: 50
			bradley: 30

			# Minimal logistics
			truk: 10

		UnitLimits:
			truk: 2
			tecn.america: 2
			e6.america: 1

	SquadManagerBotModule@america.rush:
		RequiresCondition: enable-ai-rush && player.nato
		SquadSize: 4
		SquadSizeRandomBonus: 6
		RushInterval: 80
		AttackScanRadius: 40
		DangerScanRadius: 20
		ExcludeFromSquadsTypes: tecn.america, e6.america, truk, medi.america
		IgnoredEnemyTargetTypes: IgnoreThis

	# ===== Turtle AI — America (builds up, large squads, combined arms) =====
	UnitBuilderBotModule@america.turtle:
		RequiresCondition: enable-ai-turtle && player.nato
		UnitQueues: Vehicle, Infantry
		UnitsToBuild:
			# Conscripts for capturing
			tecn.america: 500

			# Infantry -- more balanced with support emphasis
			e3.america: 100
			ar.america: 80
			tl.america: 60
			e2.america: 50

			# Strong support roster
			at.america: 60
			mt.america: 50
			medi.america: 50
			aa.america: 40
			sn.america: 35
			e6.america: 25

			# Heavy vehicle emphasis
			humvee: 20
			bradley: 35
			abrams: 40
			m113: 20
			m109: 25
			strykershorad: 15

			# Supply trucks
			truk: 25

		UnitLimits:
			truk: 5
			tecn.america: 3
			e6.america: 3
			m109: 4
			strykershorad: 3
			sn.america: 4

	SquadManagerBotModule@america.turtle:
		RequiresCondition: enable-ai-turtle && player.nato
		SquadSize: 10
		SquadSizeRandomBonus: 15
		RushInterval: 300
		AttackScanRadius: 35
		DangerScanRadius: 30
		ExcludeFromSquadsTypes: tecn.america, e6.america, truk, medi.america
		IgnoredEnemyTargetTypes: IgnoreThis
