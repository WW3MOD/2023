SUPPLYCACHE:
	Inherits: ^SpriteActor
	Selectable:
		Bounds: 1024, 1024
	Tooltip:
		Name: Supply Cache
	Building:
		Dimensions: 1,1
		Footprint: x
		TerrainTypes: Clear,Road,Beach,Rough
	FrozenUnderFog:
	Health:
		HP: 5000
	Armor:
		Type: Light
	Targetable:
		TargetTypes: Ground, Structure, NoAutoTarget
	ProximityCapturable:
		Range: 1c512
		Sticky: true
		CaptorTypes: Player, Vehicle, Tank, Infantry
	HitShape:
		Type: Circle
			Radius: 512
	RenderSprites:
	WithSpriteBody@Full:
		Name: full
		Image: ammobox1
		RequiresCondition: supply-high
	WithSpriteBody@Mid:
		Name: mid
		Image: ammobox2
		RequiresCondition: supply-medium
	WithSpriteBody@Low:
		Name: low
		Image: ammobox3
		RequiresCondition: !supply-high && !supply-medium
	SupplyProvider:
		Range: 4c0
		RearmDelay: 25
		TotalSupply: 500
		RearmCondition: replenish-soldiers
		SupplyCreditValue: 400
		SupplyHighCondition: supply-high
		SupplyMediumCondition: supply-medium
		SupplyLowCondition: supply-low
	RenderRangeCircle@Supply:
		FallbackRange: 4c0
		Color: C0C0C0
		Width: 1.5
		Alpha: 100
		RequireShift: false
	Sellable:
		RefundPercent: 50
