^Mine:
	Inherits: ^SpriteActor
	Tooltip:
		Name: Mine
	Interactable:
		Bounds: 1024, 1024
	WithSpriteBody:
	RenderSprites:
		Scale: 0.5
	Building:
		Dimensions: 1,1
		Footprint: x
		TerrainTypes: Clear, Road, Beach, Rough, Bridge
		DontAttackedNotify: true
	FrozenUnderFog:
	Passable:
		PassClasses: mine
		CrushedByRelationships: Enemy, Neutral
	ProximityExternalCondition@MineProximity:
		Condition: mine-proximity
		Range: 512
		ValidRelationships: Ally, Neutral, Enemy
	WithDamageBehaviour:
		DamageTypes: Disarm
		Behaviour: Dispose
	Health:
		HP: 500
		NotifyAppliedDamage: false
	Armor:
		Type: Light
	Cloak:
		CloakSound:
		UncloakSound:
		Palette:
		DetectionTypes: Mine
		RevealedDelay: 200 # 2147483647 # Once discovered, stays uncloaked
		InitialDelay: 0
		UpdateFrequency: 20
	Targetable:
		TargetTypes: Mine
	HitShape:
	MapEditorData:
		Categories: System

MINV:
	Inherits: ^Mine
	RenderSprites:
		Image: minv
	Explodes:
		Weapon: ATMine

^Crate:
	Inherits@1: ^SpriteActor
	Interactable:
		Bounds: 1024,1024
	Detectable:
		Vision: 2
	Tooltip:
		Name: Crate
		GenericName: Crate
		ShowOwnerRow: false
	Crate:
		Duration: 180
		TerrainTypes: Clear, Rough, Road, Beach, Water
	RenderSprites:
		Palette: effect
		Image: scrate
	WithCrateBody:
		XmasImages: xcratea, xcrateb, xcratec, xcrated
		LandSequence: land
		WaterSequence: water
	Parachutable:
		FallRate: 40
		KilledOnImpassableTerrain: false
		ParachutingCondition: parachute
	Passenger:
	WithParachute:
		Image: parach
		Sequence: idle
		OpeningSequence: open
		ShadowImage: parach-shadow
		ShadowSequence: idle
		RequiresCondition: parachute
	MapEditorData:
		Categories: System

CRATE:
	Inherits: ^Crate
	GiveCashCrateAction:
		Amount: 1000
		SelectionShares: 50
		UseCashTick: true
	# HealActorsCrateAction:
	# 	Sound: heal2.aud
	# 	SelectionShares: 2
	# 	Sequence: heal
MONEYCRATE:
	Inherits: ^Crate
	Tooltip:
		Name: Money Crate
	GiveCashCrateAction:
		Amount: 500
		SelectionShares: 1
		UseCashTick: true
	RenderSprites:
		Image: wcrate
HEALCRATE:
	Inherits: ^Crate
	Tooltip:
		Name: Heal Crate
	HealActorsCrateAction:
		Sound: heal2.aud
		SelectionShares: 1
		Sequence: heal
WCRATE:
	Inherits: ^Crate
	Tooltip:
		Name: Wooden Crate
	RenderSprites:
		Image: wcrate
SCRATE:
	Inherits: ^Crate
	Tooltip:
		Name: Steel Crate
HEALUPCRATE:
	Inherits: ^Crate
	Tooltip:
		Name: Heal-up Crate
		GenericName: Heal-up Crate
		ShowOwnerRow: false
	GrantExternalConditionCrateAction@1:
		SelectionShares: 1
		Sequence: heal
		Sound: heal2.aud
		Condition: instaheal
		Duration: 750
		Range: 1c512
		MaxExtraCollectors: 24
	GrantExternalConditionCrateAction@2:
		SelectionShares: 1
		Sequence: heal
		Sound: heal2.aud
		Condition: instarepair
		Duration: 2
	WithCrateBody:
		XmasImages: scrate-healup
	RenderSprites:
		Image: scrate-healup
	-MapEditorData:

