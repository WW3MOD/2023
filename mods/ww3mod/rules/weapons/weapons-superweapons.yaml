Atomic:
	ValidTargets: Ground, Trees, Water, Underwater, Air

	# ===== PHASE 0: THE FLASH (Tick 0) =====
	# Blinding white flash — arrives at speed of light
	Warhead@Flash: FlashPaletteEffect
		Duration: 30
		FlashType: Nuke

	# Screen shake: progressive decay — massive initial impact, then fading rumble
	# Total coverage: 0→210 ticks (matches blast wave duration)
	Warhead@Shake1: ShakeScreen
		Duration: 25
		Intensity: 80
	Warhead@Shake2: ShakeScreen
		Duration: 50
		Intensity: 40
		Delay: 25
	Warhead@Shake3: ShakeScreen
		Duration: 75
		Intensity: 15
		Delay: 75
	Warhead@Shake4: ShakeScreen
		Duration: 60
		Intensity: 5
		Delay: 150

	# Fireball visual — mushroom cloud sprite at 300% scale
	Warhead@Fireball: CreateEffect
		Explosions: nuke_large
		ScalePercent: 300
		Offset: 0,-1900,0
		Palette: effect_ts
		ZOffset: 4096
		ImpactSounds: kaboom1.aud
		ImpactActors: false
		VisibleThroughFog: true
		ValidTargets: Ground, Water, Air

	# ===== PHASE 1: THERMAL RADIATION — Constant Fireball Shine =====
	# The fireball forms in milliseconds and immediately reaches peak brightness.
	# For ~2 seconds (50 ticks), it shines at peak thermal intensity — a constant,
	# repeating pulse of thermal radiation cooking everything in line of sight.
	# Inverse falloff: close units melt visibly over the 2 seconds; far units barely singed.
	# After the thermal shine fades, the shockwave arrives to finish survivors.

	# Instant vaporization at ground zero (0-2 cells) — nothing survives this close
	Warhead@ThermalVaporize: SpreadDamage
		Spread: 1c0
		Damage: 200000
		Penetration: 5000
		Falloff: 100, 100, 100
		Delay: 1
		ValidTargets: Ground, Trees, Water, Underwater, Air
		DamageTypes: FireDeath
		AirThreshold: 10c0

	# Sustained thermal radiation — damage pulses every 3 ticks for 50 ticks (~17 pulses)
	# Inverse-square-ish falloff: 100% at center, drops steeply with distance
	# At 3 cells: ~30% per pulse — infantry cooked to death in seconds
	# At 6 cells: ~8% per pulse — infantry visibly melting, vehicles scorched
	# At 10 cells: ~2% per pulse — light burns, suppressed
	# At 15+ cells: negligible — only the shockwave matters here
	Warhead@ThermalRadiation: ThermalRadiation
		RadiationDuration: 50
		DamageInterval: 3
		Spread: 1c0
		Damage: 3000
		Penetration: 300
		Falloff: 100, 60, 35, 20, 12, 8, 5, 3, 2, 1, 1, 0, 0, 0, 0
		Delay: 1
		ValidTargets: Ground, Trees, Water, Underwater, Air
		DamageTypes: FireDeath
		AirThreshold: 10c0
		Versus:
			Light: 120
			Wood: 500
			Medium: 60
			Heavy: 30
			Concrete: 20

	# ===== FIRE: Staggered thermal ignition =====
	# 10 warheads with staggered delays simulate the thermal radiation
	# igniting flammable materials at different distances.
	# Close units catch fire immediately (within the fireball shine);
	# far units only start burning as the thermal pulse reaches them.
	# Overlapping ranges mean close units accumulate fire stacks faster:
	#
	# At 5 cells:  gets Fire1(t1) → Fire10(t50) = 10 stacks over 2.0s
	# At 15 cells: gets Fire3(t11) → Fire10(t50) = 8 stacks from 0.4s to 2.0s
	# At 20 cells: gets Fire6(t26) → Fire10(t50) = 5 stacks from 1.0s to 2.0s
	# At 25 cells: gets Fire9(t44), Fire10(t50) = 2 stacks, barely burning
	Warhead@Fire1: GrantExternalCondition
		Range: 10c0
		Amount: 1
		Duration: 750
		Condition: onfire
		Delay: 1
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	Warhead@Fire2: GrantExternalCondition
		Range: 12c0
		Amount: 1
		Duration: 700
		Condition: onfire
		Delay: 6
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	Warhead@Fire3: GrantExternalCondition
		Range: 14c0
		Amount: 1
		Duration: 650
		Condition: onfire
		Delay: 11
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	Warhead@Fire4: GrantExternalCondition
		Range: 16c0
		Amount: 1
		Duration: 600
		Condition: onfire
		Delay: 16
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	Warhead@Fire5: GrantExternalCondition
		Range: 18c0
		Amount: 1
		Duration: 550
		Condition: onfire
		Delay: 21
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	Warhead@Fire6: GrantExternalCondition
		Range: 20c0
		Amount: 1
		Duration: 500
		Condition: onfire
		Delay: 26
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	Warhead@Fire7: GrantExternalCondition
		Range: 22c0
		Amount: 1
		Duration: 450
		Condition: onfire
		Delay: 32
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	Warhead@Fire8: GrantExternalCondition
		Range: 24c0
		Amount: 1
		Duration: 400
		Condition: onfire
		Delay: 38
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	Warhead@Fire9: GrantExternalCondition
		Range: 26c0
		Amount: 1
		Duration: 350
		Condition: onfire
		Delay: 44
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	Warhead@Fire10: GrantExternalCondition
		Range: 28c0
		Amount: 1
		Duration: 300
		Condition: onfire
		Delay: 50
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0

	# ===== PHASE 2: EMP (Tick 0) — Simultaneous with Flash =====
	# Tactical nuke EMP disables vehicles and electronics
	Warhead@EMP: GrantExternalCondition
		Range: 15c0
		Duration: 375
		Condition: empdisable
		Delay: 0
		ValidTargets: Ground, Water
		InvalidTargets: Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0

	# ===== PHASE 3: BLAST WAVE (Tick 3 → ~178) — Speed of Sound =====
	# Expanding shockwave at ~7 ticks/cell (340 m/s at 100m/cell)
	# Single warhead replaces 53 manual SpreadDamage warheads!
	Warhead@BlastWave: ShockwaveDamage
		StartDelay: 3
		WaveSpeed: 7
		MaxRadius: 30c0
		Damage: 100000
		Penetration: 5000
		Spread: 1c0
		# 30 entries = 30 cells. Inner cells devastating, progressively less, last 5 cells minimal
		Falloff: 500, 450, 400, 350, 300, 250, 200, 160, 130, 100, 80, 60, 45, 35, 25, 18, 12, 8, 5, 3, 2, 1, 1, 1, 1, 0, 0, 0, 0, 0
		Versus:
			Light: 80
			Wood: 600
			Medium: 60
			Heavy: 40
			Concrete: 30
		ValidTargets: Ground, Trees, Water, Underwater, Air
		AffectsParent: true
		DamageTypes: ExplosionDeath
		AirThreshold: 10c0

	# ===== PHASE 4: BLAST SUPPRESSION (Staggered with blast wave) =====
	# Suppression arrives with the blast wave at each range band
	# 5 cells (~tick 38): maximum suppression
	Warhead@SuppressionClose: GrantExternalCondition
		Range: 8c0
		Amount: 10
		Duration: 200
		Condition: suppression-1
		Delay: 38
		ValidTargets: Infantry
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 10 cells (~tick 77)
	Warhead@SuppressionMedium: GrantExternalCondition
		Range: 15c0
		Amount: 7
		Duration: 150
		Condition: suppression-1
		Delay: 77
		ValidTargets: Infantry
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 20 cells (~tick 150)
	Warhead@SuppressionFar: GrantExternalCondition
		Range: 25c0
		Amount: 4
		Duration: 100
		Condition: suppression-1
		Delay: 150
		ValidTargets: Infantry
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 25 cells (~tick 187): moderate suppression, strong winds
	Warhead@SuppressionWind: GrantExternalCondition
		Range: 28c0
		Amount: 3
		Duration: 75
		Condition: suppression-1
		Delay: 187
		ValidTargets: Infantry
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 30 cells (~tick 213): light suppression, soldiers take cover from wind
	Warhead@SuppressionOuter: GrantExternalCondition
		Range: 32c0
		Amount: 1
		Duration: 40
		Condition: suppression-1
		Delay: 213
		ValidTargets: Infantry
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0

	# ===== PHASE 5: TERRAIN SCARRING =====
	Warhead@Crater: LeaveSmudge
		Size: 3
		SmudgeType: Crater
		Delay: 5
		InvalidTargets: Vehicle, Structure, Wall
		AirThreshold: 10c0
	Warhead@Scorch1: LeaveSmudge
		Size: 5
		SmudgeType: Scorch
		Delay: 10
		InvalidTargets: Vehicle, Structure, Wall
		AirThreshold: 10c0
	Warhead@Scorch2: LeaveSmudge
		Size: 7
		Chance: 60
		SmudgeType: Scorch
		Delay: 20
		InvalidTargets: Vehicle, Structure, Wall
		AirThreshold: 10c0

