Atomic:
	ValidTargets: Ground, Trees, Water, Underwater, Air

	# ===== PHASE 0: THE FLASH (Tick 0) =====
	# Blinding white flash — arrives at speed of light
	Warhead@Flash: FlashPaletteEffect
		Duration: 30
		FlashType: Nuke

	# Screen shake persists through entire blast wave (~8 seconds)
	Warhead@Shake: ShakeScreen
		Duration: 200
		Intensity: 80

	# Fireball visual — mushroom cloud sprite at 300% scale
	Warhead@Fireball: CreateEffect
		Explosions: nuke_large
		ScalePercent: 300
		Offset: 0,-1900,0
		Palette: effect_ts
		ImpactSounds: kaboom1.aud
		ImpactActors: false
		VisibleThroughFog: true
		ValidTargets: Ground, Water, Air

	# ===== PHASE 1: THERMAL RADIATION (Tick 0-2) — Speed of Light =====
	# Thermal pulse arrives essentially instantly. This is the FIRST damage.
	# Ground zero (0-1 cells): Vaporization — only the very center
	Warhead@ThermalVaporize: SpreadDamage
		Spread: 1c0
		Damage: 200000
		Penetration: 10000
		Falloff: 100, 20
		Delay: 1
		ValidTargets: Ground, Trees, Water, Underwater, Air
		DamageTypes: FireDeath
		AirThreshold: 10c0

	# Close thermal (1-5 cells): Heavy burns but survivable briefly — fire does the killing
	Warhead@ThermalClose: SpreadDamage
		Spread: 1c0
		Damage: 15000
		Penetration: 2000
		Falloff: 0, 100, 80, 50, 25, 8
		Delay: 1
		ValidTargets: Ground, Trees, Water, Underwater, Air
		DamageTypes: FireDeath
		AirThreshold: 10c0

	# Medium thermal (5-12 cells): Burns, not immediately lethal
	Warhead@ThermalMedium: SpreadDamage
		Spread: 1c0
		Damage: 4000
		Penetration: 500
		Falloff: 0, 0, 0, 0, 0, 100, 70, 45, 25, 15, 8, 3, 1
		Delay: 2
		ValidTargets: Ground, Trees, Water, Air
		DamageTypes: FireDeath
		AirThreshold: 10c0

	# Fire condition grants — graduated by range, all near-instant (thermal speed)
	# The fire is what creates the horror: soldiers burning alive at different intensities
	# 0-2 cells: onfire x10 (maximum, kills infantry fast but they burn visibly first)
	Warhead@FireGZ: GrantExternalCondition
		Range: 10c0
		Amount: 10
		Duration: 750
		Condition: onfire
		Delay: 1
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 2-5 cells: onfire x8
	Warhead@FireClose1: GrantExternalCondition
		Range: 12c0
		Amount: 8
		Duration: 600
		Condition: onfire
		Delay: 1
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 5-8 cells: onfire x6
	Warhead@FireClose2: GrantExternalCondition
		Range: 15c0
		Amount: 6
		Duration: 400
		Condition: onfire
		Delay: 1
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 8-12 cells: onfire x4
	Warhead@FireMedium: GrantExternalCondition
		Range: 17c0
		Amount: 4
		Duration: 250
		Condition: onfire
		Delay: 2
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 12-16 cells: onfire x2
	Warhead@FireFar: GrantExternalCondition
		Range: 19c0
		Amount: 2
		Duration: 100
		Condition: onfire
		Delay: 2
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 16-22 cells: onfire x1 (light burns, survivable)
	Warhead@FireOuter: GrantExternalCondition
		Range: 22c0
		Amount: 1
		Duration: 50
		Condition: onfire
		Delay: 2
		ValidTargets: Structure, Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0

	# ===== PHASE 2: EMP (Tick 0) — Simultaneous with Flash =====
	# Tactical nuke EMP disables vehicles and electronics
	Warhead@EMP: GrantExternalCondition
		Range: 15c0
		Duration: 375
		Condition: empdisable
		Delay: 0
		ValidTargets: Ground, Water
		InvalidTargets: Infantry, Trees
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0

	# ===== PHASE 3: BLAST WAVE (Tick 3 → ~178) — Speed of Sound =====
	# Expanding shockwave at ~7 ticks/cell (340 m/s at 100m/cell)
	# Single warhead replaces 53 manual SpreadDamage warheads!
	Warhead@BlastWave: ShockwaveDamage
		StartDelay: 3
		WaveSpeed: 7
		MaxRadius: 30c0
		Damage: 100000
		Penetration: 5000
		Spread: 1c0
		# 30 entries = 30 cells. Inner cells devastating, progressively less, last 5 cells minimal
		Falloff: 500, 450, 400, 350, 300, 250, 200, 160, 130, 100, 80, 60, 45, 35, 25, 18, 12, 8, 5, 3, 2, 1, 1, 1, 1, 0, 0, 0, 0, 0
		Versus:
			Light: 80
			Wood: 600
			Medium: 60
			Heavy: 40
			Concrete: 30
		ValidTargets: Ground, Trees, Water, Underwater, Air
		AffectsParent: true
		DamageTypes: ExplosionDeath
		AirThreshold: 10c0

	# ===== PHASE 4: BLAST SUPPRESSION (Staggered with blast wave) =====
	# Suppression arrives with the blast wave at each range band
	# 5 cells (~tick 38): maximum suppression
	Warhead@SuppressionClose: GrantExternalCondition
		Range: 8c0
		Amount: 10
		Duration: 200
		Condition: suppression-1
		Delay: 38
		ValidTargets: Infantry
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 10 cells (~tick 77)
	Warhead@SuppressionMedium: GrantExternalCondition
		Range: 15c0
		Amount: 7
		Duration: 150
		Condition: suppression-1
		Delay: 77
		ValidTargets: Infantry
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 20 cells (~tick 150)
	Warhead@SuppressionFar: GrantExternalCondition
		Range: 25c0
		Amount: 4
		Duration: 100
		Condition: suppression-1
		Delay: 150
		ValidTargets: Infantry
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 25 cells (~tick 187): moderate suppression, strong winds
	Warhead@SuppressionWind: GrantExternalCondition
		Range: 28c0
		Amount: 3
		Duration: 75
		Condition: suppression-1
		Delay: 187
		ValidTargets: Infantry
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0
	# 30 cells (~tick 213): light suppression, soldiers take cover from wind
	Warhead@SuppressionOuter: GrantExternalCondition
		Range: 32c0
		Amount: 1
		Duration: 40
		Condition: suppression-1
		Delay: 213
		ValidTargets: Infantry
		ValidRelationships: Ally, Neutral, Enemy
		AirThreshold: 10c0

	# ===== PHASE 5: TERRAIN SCARRING =====
	Warhead@Crater: LeaveSmudge
		Size: 3
		SmudgeType: Crater
		Delay: 5
		InvalidTargets: Vehicle, Structure, Wall
		AirThreshold: 10c0
	Warhead@Scorch1: LeaveSmudge
		Size: 5
		SmudgeType: Scorch
		Delay: 10
		InvalidTargets: Vehicle, Structure, Wall
		AirThreshold: 10c0
	Warhead@Scorch2: LeaveSmudge
		Size: 7
		Chance: 60
		SmudgeType: Scorch
		Delay: 20
		InvalidTargets: Vehicle, Structure, Wall
		AirThreshold: 10c0

EmpBomb:
	BurstWait: 10
	Range: 0c512
	Report: chute1.aud
	Projectile: GravityBomb
		Image: PARABOMB
		OpenSequence: open
		Velocity: 0, 0, -86
		Acceleration: 0, 0, 0
	Warhead@Spread: SpreadDamage
		Spread: 4c512
		Damage: 36
		DamageTypes: Prone30Percent
	Warhead@Effect: CreateEffect
		Explosions: pulse_explosion
		ImpactSounds: ion1.aud
	Warhead@emp: GrantExternalCondition
		Range: 4c512
		Duration: 500
		Condition: empdisable
		ValidTargets: Vehicle, Ship, Submarine
		InvalidTargets: EMPInvalid
	Warhead@empbuilding: GrantExternalCondition
		Range: 4c512
		Duration: 500
		Condition: empdisable
		ValidTargets: Structure
		InvalidTargets: EMPInvalid
	Warhead@Smudge_impact: LeaveSmudge
		SmudgeType: Scorch
		InvalidTargets: Vehicle, Structure, Wall
		Size: 1
