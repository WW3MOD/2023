	Inherits: WGM
	Burst: 2
	BurstDelays: 100
	BurstWait: 1000

Hellfire:
	Inherits@ExplosionEffects: ^MediumExplosionEffects
	# Tree gating (260510): same numbers as WGM. See WGM for explanation.
	ClearSightThreshold: 3
	FreeLineDensity: 1
	MissChancePerDensity: 15
	ValidTargets: Vehicle, Air, Defense
	Range: 25c0
	MinRange: 5c0
	BurstWait: 60
	Report: missile6.aud
	Projectile: Missile
		Blockable: false
		# Accuracy (260510): same direction as WGM — tight inaccuracy, faster
		# turn, frequent retarget for moving targets.
		Speed: 500
		MaximumLaunchSpeed: 100
		Acceleration: 30
		# Range-scaled inaccuracy — see WGM.
		Inaccuracy: 16
		InaccuracyType: PerCellIncrement
		HorizontalRateOfTurn: 60
		RetargetTicks: 2
		# See WGM — prevents the descent-into-ground "fall short" bug.
		TerrainHeightAware: true
		# Operator retargeting (heli pilot) — see WGM.
		OperatorRetargetTicks: 50
		RangeLimit: 27c0
		ContrailLength: 10
		Image: dragon
	Warhead@Target: TargetDamage
		ValidTargets: Ground, Water, Air
		Damage: 10000
		Penetration: 800
		DamageTypes: ExplosionDeath
	Warhead@Spread: SpreadDamage
		ValidTargets: Ground, Water, Air
		Spread: 64
		Damage: 2000
		DamageTypes: ExplosionDeath

