WGM:
	Inherits@ExplosionEffects: ^MediumExplosionEffects
	# Tree gating (260510): wire-guided ATGM is sensitive to foliage. ClearSightThreshold caps
	# total shadow density on the firing line; FreeLineDensity makes the first ~1 unit (one
	# small tree) a clean shot; MissChancePerDensity rolls a per-shot miss for each excess
	# unit, redirecting the missile to clip a tree on the line. Projectile.Blockable=false
	# disables the in-flight RNG roulette so the fire-time roll is the sole arbiter.
	ClearSightThreshold: 3
	FreeLineDensity: 1
	MissChancePerDensity: 15
	ValidTargets: Vehicle, Defense
	Range: 25c0
	MinRange: 3c0
	BurstWait: 500
	Report: vhumwe2a.wav, vhumwe2b.wav, vhumwe2c.wav, vhumwe2d.wav
	Projectile: Missile
		Blockable: false
		# Accuracy (260511): range-scaled — wire-guided by a human operator, so close
		# shots are near-perfect and long shots scatter realistically. PerCellIncrement 20
		# × 25c max range = 500 wd ≈ half a cell at maximum range. ManualGuidance kept
		# true (loses guidance if launcher dies) — matches the wire-guided fiction.
		Inaccuracy: 20
		InaccuracyType: PerCellIncrement
		RangeLimit: 25c0
		Speed: 300
		Acceleration: 30
		MaximumLaunchSpeed: 50
		# Turn rate (260511): dropped 60 → 8 so the operator-retarget swing
		# curves visibly over ~9 cells instead of snapping to the new target
		# at a near-straight angle. Tradeoff: corrections on fast-moving
		# targets are weaker — acceptable for wire-guided fiction.
		HorizontalRateOfTurn: 8
		RetargetTicks: 2
		Arm: 2
		ManualGuidance: true
		# Operator retargeting: if the target dies in flight the operator
		# tries to swing onto a new enemy. Veterancy reduces the reaction
		# delay (rookie = full 50 ticks ≈ 2 s, max veteran = instant).
		OperatorRetargetTicks: 50
		# Terrain-aware homing keeps the missile above ground during the descent
		# from CruiseAltitude — without it the dive into target overshoots ground
		# 1.7 cells short of target, and the missile detonates as a "ground hit".
		TerrainHeightAware: true
		CruiseAltitude: 100
		ContrailLength: 100
		ContrailStartWidth: 8
		Image: dragon
		TrailImage: smokey
		TrailScalePercent: 75
	Warhead@Target: TargetDamage
		Damage: 10000
		Penetration: 800
		DamageTypes: ExplosionDeath
	Warhead@Spread: SpreadDamage
		# EXPERIMENT 260510: 3x splash radius — near-misses still hurt.
		Spread: 192
		Damage: 2000
		DamageTypes: ExplosionDeath

WGM.bradley:
	Inherits: WGM
	Burst: 2
	BurstDelays: 100
	BurstWait: 1000

# Ataka (9M120, AT-9 Spiral-2) — Mi-28's primary ATGM in real life. SACLOS guided:
# the gunner keeps the crosshairs on target until impact, so it shares WGM's
# range-scaled scatter (operator-guided fiction). Subsonic, tandem HEAT warhead
# (Pen 900 vs Hellfire's 800) — Russia's anti-armor specialty. Effective range
# ~6 km in real life (22c here). Faster fire cycle than WGM (BurstWait 60) since
# helis can volley Atakas — but Burst 1 to stay true to operator-guidance.
Ataka:
	Inherits@ExplosionEffects: ^MediumExplosionEffects
	# Tree gating: same numbers as WGM. See WGM for explanation.
	ClearSightThreshold: 3
	FreeLineDensity: 1
	MissChancePerDensity: 15
	ValidTargets: Vehicle, Defense
	Range: 22c0
	MinRange: 3c0
	BurstWait: 60
	Report: missile6.aud
	Projectile: Missile
		Blockable: false
		# SACLOS — range-scaled scatter like WGM (PerCellIncrement 22 × 22c max
		# = ~0c484 max). Tighter than WGM per-cell because heli optics are
		# steadier than a Bradley turret operator.
		Inaccuracy: 22
		InaccuracyType: PerCellIncrement
		Speed: 400
		Acceleration: 30
		MaximumLaunchSpeed: 80
		HorizontalRateOfTurn: 20
		RetargetTicks: 2
		ManualGuidance: true
		OperatorRetargetTicks: 50
		TerrainHeightAware: true
		Arm: 2
		CruiseAltitude: 100
		RangeLimit: 22c0
		ContrailLength: 100
		ContrailStartWidth: 8
		Image: dragon
		TrailImage: smokey
		TrailScalePercent: 75
	Warhead@Target: TargetDamage
		Damage: 10000
		# Tandem HEAT: 900 pen vs Hellfire's 800. Russia's anti-reactive-armor edge.
		Penetration: 900
		DamageTypes: ExplosionDeath
	Warhead@Spread: SpreadDamage
		Spread: 192
		Damage: 2000
		# Pen 20 matches the Heli Heavy Thickness — same heli→heli silent-vanish
		# fix as Hellfire. Operator-guided Ataka can be aimed at helis too.
		Penetration: 20
		DamageTypes: ExplosionDeath

Hellfire:
	Inherits@ExplosionEffects: ^MediumExplosionEffects
	# Tree gating (260510): same numbers as WGM. See WGM for explanation.
	ClearSightThreshold: 3
	FreeLineDensity: 1
	MissChancePerDensity: 15
	ValidTargets: Vehicle, Air, Defense
	Range: 25c0
	MinRange: 5c0
	BurstWait: 60
	Report: missile6.aud
	Projectile: Missile
		Blockable: false
		# Accuracy (260511): flat scatter — Hellfire is laser-guided (heli paints,
		# missile rides the laser), so accuracy doesn't degrade with distance the way
		# wire-guided WGM does. Tighter than infantry ATGM (0c512) — helis stay the
		# premium ATGM tier thanks to optics and time-on-target.
		Speed: 500
		MaximumLaunchSpeed: 100
		Acceleration: 30
		Inaccuracy: 0c256
		HorizontalRateOfTurn: 60
		RetargetTicks: 2
		# See WGM — prevents the descent-into-ground "fall short" bug.
		TerrainHeightAware: true
		# Operator retargeting (heli pilot) — see WGM.
		OperatorRetargetTicks: 50
		RangeLimit: 27c0
		ContrailLength: 10
		Image: dragon
	Warhead@Target: TargetDamage
		ValidTargets: Ground, Water, Air
		Damage: 10000
		Penetration: 800
		DamageTypes: ExplosionDeath
	Warhead@Spread: SpreadDamage
		# EXPERIMENT 260510: 3x splash radius (matches WGM tweak).
		ValidTargets: Ground, Water, Air
		Spread: 192
		Damage: 2000
		# Penetration 20: heli→heli silent-vanish fix (260510, updated 260511).
		# Heli HitShapes are tiny (Circle Radius 32) — at flat Inaccuracy 0c256 the
		# missile lands ~150-200 wdist from a heli target on average (PDF-weighted),
		# well outside TargetDamage's tight default 1-wdist Spread. The fall-back is
		# this SpreadDamage warhead (Spread 192). With default Penetration 1 vs
		# Heavy heli Thickness 20 the falloff damage gets /20, leaving 5-50 damage
		# per missile — perceived as "missile silently vanished". Setting Pen 20
		# matches Heavy heli thickness so near-misses do meaningful damage
		# (~500-1000) without significantly buffing splash vs Heavy tanks
		# (Thickness 280-700, still ~7% effective).
		Penetration: 20
		DamageTypes: ExplosionDeath

